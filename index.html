    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDTP9fHiAt1A8ZlddAhyjUtw16XnekRSxs",
            authDomain: "recipe-app-386e5.firebaseapp.com",
            projectId: "recipe-app-386e5",
            storageBucket: "recipe-app-386e5.firebasestorage.app",
            messagingSenderId: "519274222633",
            appId: "1:519274222633:web:ffdbcf3ae2196e25f97838",
            measurementId: "G-LY8JLRN99E"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const storage = {
            // ── Household helpers ────────────────────────────────────────────
            getDataPath: (userId, householdId) => {
                return householdId
                    ? db.collection('households').doc(householdId).collection('data')
                    : db.collection('users').doc(userId).collection('data');
            },
            getUserProfile: async (userId) => {
                const doc = await db.collection('users').doc(userId).get();
                return doc.exists ? doc.data() : { householdId: null, role: null };
            },
            getHousehold: async (householdId) => {
                const doc = await db.collection('households').doc(householdId).get();
                return doc.exists ? { id: doc.id, ...doc.data() } : null;
            },
            createHousehold: async (userId, userEmail) => {
                const code = () => Math.random().toString(36).substring(2,6).toUpperCase();
                const householdId = `${userId.slice(0,6)}-${code()}`;
                const household = {
                    createdBy: userId,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    members: [{ userId, email: userEmail, role: 'owner' }],
                    inviteCodes: {
                        editor: `E-${code()}${code()}`,
                        viewer: `V-${code()}${code()}`
                    }
                };
                await db.collection('households').doc(householdId).set(household);
                await db.collection('users').doc(userId).set({ householdId, role: 'owner' }, { merge: true });
                return { householdId, ...household };
            },
            joinHousehold: async (userId, userEmail, inviteCode) => {
                const upper = inviteCode.trim().toUpperCase();
                const isEditor = upper.startsWith('E-');
                const isViewer = upper.startsWith('V-');
                if (!isEditor && !isViewer) throw new Error('Invalid invite code format');
                const role = isEditor ? 'editor' : 'viewer';
                // Find household with matching code
                const field = isEditor ? 'inviteCodes.editor' : 'inviteCodes.viewer';
                const snapshot = await db.collection('households').where(field, '==', upper).limit(1).get();
                if (snapshot.empty) throw new Error('Invite code not found or already used');
                const householdDoc = snapshot.docs[0];
                const householdId = householdDoc.id;
                const household = householdDoc.data();
                // Check not already a member
                if (household.members.some(m => m.userId === userId)) throw new Error('You are already in this household');
                // Add member and invalidate code (one-use)
                const newMembers = [...household.members, { userId, email: userEmail, role }];
                const newCodes = { ...household.inviteCodes };
                if (isEditor) newCodes.editor = null; else newCodes.viewer = null;
                await db.collection('households').doc(householdId).update({ members: newMembers, inviteCodes: newCodes });
                await db.collection('users').doc(userId).set({ householdId, role }, { merge: true });
                return { householdId, role };
            },
            regenerateInviteCode: async (householdId, type) => {
                const code = () => Math.random().toString(36).substring(2,6).toUpperCase();
                const newCode = `${type === 'editor' ? 'E' : 'V'}-${code()}${code()}`;
                await db.collection('households').doc(householdId).update({ [`inviteCodes.${type}`]: newCode });
                return newCode;
            },
            leaveHousehold: async (userId, householdId) => {
                const household = await storage.getHousehold(householdId);
                if (!household) return;
                const remaining = household.members.filter(m => m.userId !== userId);
                if (remaining.length === 0) {
                    // Last member — delete household
                    await db.collection('households').doc(householdId).delete();
                } else {
                    // Reassign owner if needed
                    if (household.createdBy === userId && remaining.length > 0) {
                        const newOwner = remaining[0];
                        newOwner.role = 'owner';
                        await db.collection('users').doc(newOwner.userId).set({ role: 'owner' }, { merge: true });
                    }
                    await db.collection('households').doc(householdId).update({ members: remaining });
                }
                await db.collection('users').doc(userId).set({ householdId: null, role: null }, { merge: true });
            },
            removeMember: async (householdId, targetUserId) => {
                const household = await storage.getHousehold(householdId);
                if (!household) return;
                const remaining = household.members.filter(m => m.userId !== targetUserId);
                await db.collection('households').doc(householdId).update({ members: remaining });
                await db.collection('users').doc(targetUserId).set({ householdId: null, role: null }, { merge: true });
            },

            // ── Recipes (always shared) ───────────────────────────────────
            getRecipes: async () => {
                const snapshot = await db.collection('recipes').get();
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            },
            addRecipe: async (recipe) => {
                const newRecipe = { ...recipe, tags: recipe.tags || [], folders: recipe.folders || [], createdAt: firebase.firestore.FieldValue.serverTimestamp(), createdBy: auth.currentUser?.uid };
                const docRef = await db.collection('recipes').add(newRecipe);
                return { id: docRef.id, ...newRecipe };
            },
            updateRecipe: async (id, updates) => {
                await db.collection('recipes').doc(id).update({ ...updates, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            },
            deleteRecipe: async (id) => { await db.collection('recipes').doc(id).delete(); },
            getAllTags: (recipes) => { const s = new Set(); recipes.forEach(r => (r.tags||[]).forEach(t => s.add(t))); return Array.from(s).sort(); },
            getAllFolders: (recipes) => { const s = new Set(); recipes.forEach(r => (r.folders||[]).forEach(f => s.add(f))); return Array.from(s).sort(); },

            // ── Shopping list (household-aware) ───────────────────────────
            getShoppingList: async (userId, householdId) => { const doc = await storage.getDataPath(userId, householdId).doc('shoppingList').get(); return doc.exists ? doc.data() : { items: [], manualItems: [] }; },
            saveShoppingList: async (userId, householdId, list) => { await storage.getDataPath(userId, householdId).doc('shoppingList').set(list); },
            addToShoppingList: async (userId, householdId, recipe, servings) => {
                const list = await storage.getShoppingList(userId, householdId);
                const scaleFactor = servings / recipe.servings;
                const essentials = ['salt','pepper','black pepper','water','olive oil','vegetable oil','cooking oil','salt and pepper'];
                const baseIngredientMap = { 'lemon juice':'lemon','lemon zest':'lemon','lemon wedges':'lemon','lemon wedge':'lemon','lime juice':'lime','lime zest':'lime','lime wedges':'lime','lime wedge':'lime','orange juice':'orange','orange zest':'orange','grated ginger':'fresh ginger','fresh ginger':'fresh ginger','ginger paste':'fresh ginger','minced garlic':'garlic','garlic cloves':'garlic','grated garlic':'garlic','garlic paste':'garlic' };
                const getBaseIngredient = (item) => { const l = item.toLowerCase(); for (const [d,b] of Object.entries(baseIngredientMap)) { if (l.includes(d)) return b; } return item; };
                const estimateQuantity = (baseItem, needs) => {
                    if (!needs||needs.length===0) return '';
                    const uniqueNeeds=[...new Set(needs)].length;
                    if (['lemon','lime','orange'].includes(baseItem.toLowerCase())) { if(uniqueNeeds===1) return '1-2'; if(uniqueNeeds===2) return '2-3'; return '3-4'; }
                    if (baseItem.toLowerCase()==='garlic') return needs.length<=6 ? '1' : '2';
                    if (baseItem.toLowerCase().includes('ginger')) return '1';
                    return '';
                };
                recipe.ingredients.forEach(ing => {
                    if (essentials.some(e => ing.item.toLowerCase().includes(e))) return;
                    const scaledAmount = ing.amount * scaleFactor;
                    const baseItem = getBaseIngredient(ing.item);
                    const needsConsolidation = baseItem !== ing.item;
                    const existingIndex = list.items.findIndex(item => item.item.toLowerCase() === baseItem.toLowerCase());
                    if (existingIndex !== -1) {
                        const existing = list.items[existingIndex];
                        const existingRecipeEntry = existing.recipes.findIndex(r => r.name === recipe.name && r.needs === (needsConsolidation ? ing.item : null));
                        if (existingRecipeEntry !== -1) { existing.recipes[existingRecipeEntry].servings = servings; }
                        else { existing.recipes.push({ name: recipe.name, servings, needs: needsConsolidation ? ing.item : null }); }
                        if (!needsConsolidation) existing.amount = existing.recipes.filter(r=>!r.needs).reduce((sum,r)=>{ const sf=r.servings/recipe.servings; return sum+(ing.amount*sf); },0);
                        if (needsConsolidation) { const allNeeds = existing.recipes.filter(r=>r.needs).map(r=>r.needs); existing.estimatedQty = estimateQuantity(baseItem, allNeeds); }
                    } else {
                        const newItem = { item: baseItem, amount: needsConsolidation?'':scaledAmount, unit: needsConsolidation?'':ing.unit, category: ing.category, checked: false, recipes: [{name: recipe.name, servings, needs: needsConsolidation?ing.item:null}] };
                        if (needsConsolidation) newItem.estimatedQty = estimateQuantity(baseItem,[ing.item]);
                        list.items.push(newItem);
                    }
                });
                await storage.saveShoppingList(userId, householdId, list);
            },
            addManualItem: async (userId, householdId, item, amount, unit, category) => { const list = await storage.getShoppingList(userId, householdId); list.manualItems.push({ id: Date.now().toString(), item, amount: amount||0, unit: unit||'', category: category||'other', checked: false }); await storage.saveShoppingList(userId, householdId, list); },
            toggleShoppingItem: async (userId, householdId, itemId, isManual) => { const list = await storage.getShoppingList(userId, householdId); if(isManual){const item=list.manualItems.find(i=>i.id===itemId);if(item)item.checked=!item.checked;}else{const item=list.items.find(i=>i.item===itemId);if(item)item.checked=!item.checked;} await storage.saveShoppingList(userId, householdId, list); },
            clearShoppingList: async (userId, householdId) => { await storage.saveShoppingList(userId, householdId, { items:[], manualItems:[] }); },
            removeShoppingItem: async (userId, householdId, itemId, isManual) => { const list = await storage.getShoppingList(userId, householdId); if(isManual){list.manualItems=list.manualItems.filter(i=>i.id!==itemId);}else{list.items=list.items.filter(i=>i.item!==itemId);} await storage.saveShoppingList(userId, householdId, list); },
            editShoppingItem: async (userId, householdId, itemId, isManual, amount, unit) => { const list = await storage.getShoppingList(userId, householdId); if(isManual){const item=list.manualItems.find(i=>i.id===itemId);if(item){item.amount=parseFloat(amount)||0;item.unit=unit;}}else{const item=list.items.find(i=>i.item===itemId);if(item){item.amount=parseFloat(amount)||0;item.unit=unit;}} await storage.saveShoppingList(userId, householdId, list); },
            removeRecipeFromShoppingList: async (userId, householdId, recipeName) => {
                const list = await storage.getShoppingList(userId, householdId);
                list.items = list.items.filter(item => {
                    const remaining = (item.recipes||[]).filter(r => r.name !== recipeName);
                    if (remaining.length === 0) return false;
                    item.recipes = remaining;
                    return true;
                });
                await storage.saveShoppingList(userId, householdId, list);
            },
            getMealPlan: async (userId, householdId) => { const doc = await storage.getDataPath(userId, householdId).doc('mealPlan').get(); return doc.exists ? doc.data() : { days:{} }; },
            saveMealPlan: async (userId, householdId, plan) => { await storage.getDataPath(userId, householdId).doc('mealPlan').set(plan); },
            addRecipeToMealPlan: async (userId, householdId, dayKey, mealType, recipeId, servings) => { const plan = await storage.getMealPlan(userId, householdId); if(!plan.days[dayKey])plan.days[dayKey]={breakfast:[],lunch:[],dinner:[],notes:''}; if(!plan.days[dayKey][mealType])plan.days[dayKey][mealType]=[]; plan.days[dayKey][mealType].push({recipeId,servings}); await storage.saveMealPlan(userId,householdId,plan); },
            addManualEntryToMealPlan: async (userId, householdId, dayKey, mealType, manualText) => { const plan = await storage.getMealPlan(userId, householdId); if(!plan.days[dayKey])plan.days[dayKey]={breakfast:[],lunch:[],dinner:[],notes:''}; if(!plan.days[dayKey][mealType])plan.days[dayKey][mealType]=[]; plan.days[dayKey][mealType].push({recipeId:'manual',servings:0,manualText}); await storage.saveMealPlan(userId,householdId,plan); },
            removeRecipeFromMealPlan: async (userId, householdId, dayKey, mealType, index) => { const plan = await storage.getMealPlan(userId, householdId); if(plan.days[dayKey]&&plan.days[dayKey][mealType]){plan.days[dayKey][mealType].splice(index,1);await storage.saveMealPlan(userId,householdId,plan);} },
            updateDayNotes: async (userId, householdId, dayKey, notes) => { const plan = await storage.getMealPlan(userId, householdId); if(!plan.days[dayKey])plan.days[dayKey]={breakfast:[],lunch:[],dinner:[],notes:''}; plan.days[dayKey].notes=notes; await storage.saveMealPlan(userId,householdId,plan); },
            clearMealPlan: async (userId, householdId) => { await storage.saveMealPlan(userId,householdId,{days:{}}); },
            addMealPlanToShoppingList: async (userId, householdId, recipes) => {
                const plan = await storage.getMealPlan(userId, householdId);
                const toAdd = [];
                Object.keys(plan.days).forEach(dayKey => { const day=plan.days[dayKey]; ['breakfast','lunch','dinner'].forEach(mealType => { day[mealType]?.forEach(meal => { const recipe=recipes.find(r=>r.id===meal.recipeId); if(recipe)toAdd.push({recipe,servings:meal.servings}); }); }); });
                const list = await storage.getShoppingList(userId, householdId);
                list.items = [];
                await storage.saveShoppingList(userId, householdId, list);
                for (const {recipe,servings} of toAdd) { await storage.addToShoppingList(userId,householdId,recipe,servings); }
                return toAdd.length;
            }
        };

        const seedInitialRecipes = async () => {
            try {
                for (const recipe of initialRecipes) { await storage.addRecipe(recipe); }
                return true;
            } catch(e) { console.error(e); return false; }
        };

ack pepper in a small bowl to make the teriyaki",duration:2},{step:5,instruction:"Set a non-stick frying pan over medium heat. Once hot, drizzle in just enough vegetable oil to coat the bottom. Add the salmon skin side down and cook for 4-5 minutes until the skin is crispy and the fish is about 80% cooked through",duration:5},{step:6,instruction:"Flip the fillets, then pour the teriyaki sauce into the pan avoiding the skin to keep it crispy. Cook for another 2 minutes as the sauce reduces slightly",duration:2},{step:7,instruction:"Lift the salmon out and let the sauce bubble for a couple more minutes until thick and glossy",duration:2},{step:8,instruction:"To serve, spoon the rice into bowls. Top with a salmon fillet, some pickled veg and shredded cabbage. Finish with sesame seeds and a lemon wedge on the side",duration:2}], nutrition:{calories:450,protein:35}, costRating:"medium", notes:"Clean, simple, delicious. The crispy skin is key - make sure not to move the salmon while the skin side is cooking. Recipe by Seema Pankhania from MOB Kitchen.", confidence:"high" },

        // ─── AUTH SCREEN ──────────────────────────────────────────────────────────
        function AuthScreen() {
            const [isLogin, setIsLogin] = useState(true);

                finally { setLoading(false); }

            return (

            const extractRecipeFromText = async (text) => {
                if (!apiKey) throw new Error('Please add your Claude API key in settings');
                const response = await fetch('/.netlify/functions/extract-recipe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, apiKey })
                });
                if (!response.ok) { const err = await response.json(); throw new Error(err.error || 'Failed to extract recipe'); }
                const data = await response.json();
                return data.recipe;
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!apiKey) { toast('Please add your Claude API key in Settings first', 'warning'); return; }
                setProcessing(true);
                try {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        try {
                            const base64Data = event.target.result.split(',')[1];
                            const response = await fetch('/.netlify/functions/extract-recipe', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ image: { data: base64Data, mediaType: file.type }, apiKey, sourceType: 'image' })
                            });
                            if (!response.ok) { const err = await response.json(); throw new Error(err.error || 'Failed to extract recipe from image'); }
                            const data = await response.json();
                            setExtractedRecipe(data.recipe);
                            setView('preview');
                        } catch(err) { toast('Error extracting recipe from image: ' + err.message, 'error'); }
                        finally { setProcessing(false); e.target.value = ''; }
                    };
                    reader.readAsDataURL(file);
                } catch(err) { toast('Error processing image: ' + err.message, 'error'); setProcessing(false); e.target.value = ''; }
            };

            const handlePDFUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                if (!apiKey) { toast('Please add your Claude API key in Settings first','warning'); return; }
                setProcessing(true);
                const extractedBatch = [];
                let successCount = 0, failCount = 0;
                try {
                    if (!window.pdfjsLib) {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                        document.head.appendChild(script);
                        await new Promise(resolve => { script.onload = resolve; });
                        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    }
                    for (let i = 0; i < files.length; i++) {
                        const file = files[i];
                        try {
                            const result = await new Promise((resolve, reject) => {
                                const reader = new FileReader();
                                reader.onload = async (event) => {
                                    try {
                                        const typedArray = new Uint8Array(event.target.result);
                                        const pdf = await window.pdfjsLib.getDocument(typedArray).promise;
                                        let text = '';
                                        const images = [];
                                        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                                            const page = await pdf.getPage(pageNum);
                                            const textContent = await page.getTextContent();
                                            text += textContent.items.map(item => item.str).join(' ') + '\n';
                                            // Extract images from page
                                            try {
                                                const ops = await page.getOperatorList();
                                                for (let j = 0; j < ops.fnArray.length; j++) {
                                                    if (ops.fnArray[j] === window.pdfjsLib.OPS.paintImageXObject) {
                                                        const imageName = ops.argsArray[j][0];
                                                        const image = await page.objs.get(imageName);
                                                        if (image && image.width && image.height) {
                                                            const canvas = document.createElement('canvas');
                                                            canvas.width = image.width;
                                                            canvas.height = image.height;
                                                            const ctx = canvas.getContext('2d');
                                                            const imageData = ctx.createImageData(image.width, image.height);
                                                            imageData.data.set(image.data);
                                                            ctx.putImageData(imageData, 0, 0);
                                                            images.push(canvas.toDataURL('image/jpeg', 0.8));
                                                        }
                                                    }
                                                }
                                            } catch(imgErr) {
                                                // Could not extract images from page
                                            }
                                        }
                                        resolve({ text, images });
                                    } catch(err) { reject(err); }
                                };
                                reader.onerror = reject;
                                reader.readAsArrayBuffer(file);
                            });
                            const response = await fetch('/.netlify/functions/extract-recipe', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ text: result.text, apiKey, sourceType: 'pdf' })

            const lookupIngredient = async (ingredientName) => {
                const normalized = normalizeIngredient(ingredientName);

                // 1. Check local database first (instant, no API)
                if (LOCAL_NUTRITION[normalized]) return LOCAL_NUTRITION[normalized];

                // 2. Try partial match in local db (e.g. "chicken thighs skinless and boneless" → "chicken thigh")
                for (const [key, val] of Object.entries(LOCAL_NUTRITION)) {
                    if (normalized.includes(key) || key.includes(normalized)) return val;
                }

                // 3. Try Firebase cache
                try {
                    const snapshot = await db.collection('ingredientNutrition').where('name','==',normalized).limit(1).get();
                    if (!snapshot.empty) return snapshot.docs[0].data();
                } catch(e) {}

                // 4. Fall back to USDA
                try {
                    const response = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(normalized)}&pageSize=1&api_key=DEMO_KEY`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.foods && data.foods.length > 0) {
                            const food = data.foods[0];
                            const getNutrient = (name) => { const n = food.foodNutrients.find(n => n.nutrientName.toLowerCase().includes(name.toLowerCase())); return n ? parseFloat(n.value)||0 : 0; };
                            const result = { calories:getNutrient('energy'), protein:getNutrient('protein'), carbs:getNutrient('carbohydrate'), fat:getNutrient('total lipid'), fiber:getNutrient('fiber'), sugar:getNutrient('sugars') };
                            try { await db.collection('ingredientNutrition').add({ name:normalized, ...result, source:'usda', addedAt:new Date() }); } catch(e) {}
                            return result;
                        }
                    }
                } catch(e) {}

                return null;
            };
            const importNewRecipes = async () => {
                if (!window.confirm(`This will add any recipes from the built-in library that aren't already in your collection.\n\nCurrent recipes: ${recipes.length}\nBuilt-in library: ${initialRecipes.length}\n\nProceed?`)) return;
                setProcessing(true);
                let added = 0, skipped = 0;
                try {
                    const existingNames = new Set(recipes.map(r => r.name.toLowerCase().trim()));
                    for (const recipe of initialRecipes) {
                        if (existingNames.has(recipe.name.toLowerCase().trim())) { skipped++; }
                        else { await storage.addRecipe(recipe); added++; }
                    }
                    toast(`${added} new recipes added, ${skipped} already existed`, 'success', 5000);
                } catch(e) { toast('Error importing recipes: ' + e.message, 'error'); }
                finally { setProcessing(false); }
            };

            const estimateAllRecipes = async () => {
                if (!window.confirm(`Estimate nutrition for all ${recipes.length} recipes?\n\nThis will take about ${Math.ceil(recipes.length * 3)} seconds.`)) return;
                setProcessing(true);
                let succeeded = 0, failed = 0;
                try {
                    for (const recipe of recipes) {
                        if (recipe.nutrition?.calories) { continue; }
                        try {
                            const nutrition = await estimateNutrition(recipe);
                            if (nutrition) { await db.collection('recipes').doc(recipe.id).update({ nutrition, nutritionEstimatedAt: new Date() }); succeeded++; }
                            else failed++;
                        } catch(e) { console.error(`Error estimating ${recipe.name}:`, e); failed++; }
                    }
                    toast(`${succeeded} recipes estimated${failed>0?`, ${failed} failed`:''}`, failed>0?'warning':'success', 5000);
                } catch(e) { toast('Error during batch estimation: ' + e.message, 'error'); }
                finally { setProcessing(false); }
            };
            const getMissingIngredientsReport = async () => {
                try {
                    const snapshot = await db.collection('missingIngredients').get();
                    if (snapshot.empty) { toast('No missing ingredients — all have nutrition data','success'); return; }
                    const docs = snapshot.docs.map(doc => doc.data()).sort((a,b) => (b.count||0) - (a.count||0));
                    const missing = docs.map(d => `• ${d.name} — needed in ${d.count||1} recipe${(d.count||1)>1?'s':''}`);
                    const report = `Missing Ingredients (${missing.length} total):\n\n${missing.join('\n')}`;
                    try { await navigator.clipboard.writeText(report); toast('Missing ingredients report copied to clipboard','success'); }
                    catch(e) { toast('Could not copy — check console','error'); }
                } catch(e) {
                    if (e.code === 'permission-denied' || e.message?.includes('permission')) {
                        toast('No data yet — run Estimate All Recipes first','warning');
                    } else {
                        toast('Error generating report: ' + e.message, 'error');
                    }
                }
            };
            const estimateNutrition = async (recipe) => {
                setProcessing(true);
                try {
                    let total = { calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0 };
                    let foundCount=0, missing=[];
                    for (const ing of recipe.ingredients) {
                        if (shouldSkipIngredient(ing.item, ing.unit)) continue;
                        const nd = await lookupIngredient(ing.item);
                        if (nd) { const factor = convertToBaseUnit(ing.amount,ing.unit)/100; Object.keys(total).forEach(k=>total[k]+=nd[k]*factor); foundCount++; }
                        else missing.push(ing.item);
                    }
                    const servings = recipe.servings||1;
                    const perServing = { calories:Math.round(total.calories/servings), protein:Math.round(total.protein/servings*10)/10, carbs:Math.round(total.carbs/servings*10)/10, fat:Math.round(total.fat/servings*10)/10, fiber:Math.round(total.fiber/servings*10)/10, sugar:Math.round(total.sugar/servings*10)/10 };
                    if (missing.length>0) toast(`Estimated ${foundCount}/${recipe.ingredients.length} ingredients. Missing: ${missing.slice(0,3).join(', ')}${missing.length>3?'…':''}`, 'warning', 6000);
                    return perServing;
                } catch(e) { toast('Error estimating nutrition: '+e.message, 'error'); return null; }
                finally { setProcessing(false); }
            };

            useEffect(() => {
                if (!user) return;
                setLoading(true);

                let unsubShopping = () => {};
                let unsubMealPlan = () => {};

                const setupDataListeners = (hid) => {
                    unsubShopping();
                    unsubMealPlan();
                    const dataPath = hid
                        ? db.collection('households').doc(hid).collection('data')
                        : db.collection('users').doc(user.uid).collection('data');
                    unsubShopping = dataPath.doc('shoppingList').onSnapshot(doc => {
                        if (doc.exists) setShoppingList(doc.data());
                        else setShoppingList({ items:[], manualItems:[] });
                    });
                    unsubMealPlan = dataPath.doc('mealPlan').onSnapshot(doc => {
                        if (doc.exists) setMealPlan(doc.data());
                        else setMealPlan({ days:{} });
                    });
                };

                // Single profile listener — handles household state AND data path routing
                const unsubProfile = db.collection('users').doc(user.uid).onSnapshot(async (doc) => {
                    const profile = doc.exists ? doc.data() : {};
                    const hid = profile.householdId || null;
                    const role = profile.role || null;
                    setHouseholdId(hid);
                    setUserRole(role);
                    if (hid) {
                        const hDoc = await db.collection('households').doc(hid).get();
                        if (hDoc.exists) setHousehold({ id: hDoc.id, ...hDoc.data() });
                    } else {
                        setHousehold(null);
                    }
                    setupDataListeners(hid);
                });

                const unsubRecipes = db.collection('recipes').onSnapshot((snapshot) => {
                    setRecipes(snapshot.docs.map(doc=>({id:doc.id,...doc.data()})));
                    setLoading(false);
                });

                return () => { unsubProfile(); unsubRecipes(); unsubShopping(); unsubMealPlan(); };
            }, [user]);

            useEffect(() => {
                const handleMessage = async (event) => {
                    if (event.data && event.data.type === 'RECIPE_EXTRACT') {
                        // Confirm receipt so bookmarklet stops retrying
                        if (event.source) event.source.postMessage({ type: 'RECIPE_RECEIVED' }, '*');
                        setProcessing(true);
                        try { const extracted = await extractRecipeFromText(event.data.text); setExtractedRecipe(extracted); setView('preview'); }
                        catch(err) { toast('Error extracting recipe: '+err.message, 'error'); }
                        finally { setProcessing(false); }
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, [apiKey]);

            const handleAddRecipe = async (input) => {
                setProcessing(true);
                try {
                    const processedRecipe = (input.name && input.ingredients && input.steps) ? input : (() => { throw new Error('Invalid recipe data'); })();
                    await storage.addRecipe(processedRecipe);
                    setView('home');
                    toast(`"${processedRecipe.name}" saved!`, 'success');
                } catch(err) { toast('Error saving recipe: '+err.message, 'error'); }
                finally { setProcessing(false); }
            };

            const filteredRecipes = recipes.filter(recipe => {
                if (searchQuery) { const q=searchQuery.trim().toLowerCase(); if(!recipe.name?.toLowerCase().includes(q)&&!recipe.ingredients?.some(i=>i.item.toLowerCase().includes(q))&&!recipe.tags?.some(t=>t.toLowerCase().includes(q)))return false; }
                if (selectedFolder && !recipe.folders?.includes(selectedFolder)) return false;
                if (selectedTags.length>0 && !selectedTags.every(tag=>recipe.tags?.includes(tag))) return false;
                return true;
            }).sort((a,b)=>a.name.localeCompare(b.name));

            const allFolders = storage.getAllFolders(recipes);
            const allTags = storage.getAllTags(recipes);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center" style={{ background: '#faf8f5' }}>
                    <div className="text-center">
                        <div className="animate-spin rounded-full h-16 w-16 border-b-4 mx-auto mb-4" style={{ borderColor: '#d4a574' }}></div>
                        <p style={{ color: '#8b7355' }}>Loading your recipes...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen" style={{ background: '#faf8f5' }}>
                    {processing && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
                            <div className="rounded-lg p-8 max-w-sm mx-4 text-center shadow-2xl" style={{ background: '#fffef9' }}>
                                <div className="animate-spin rounded-full h-16 w-16 border-b-4 mx-auto mb-4" style={{ borderColor: '#d4a574' }}></div>
                                <h3 className="text-xl font-bold mb-2" style={{ color: '#3d2e1f' }}>Processing Recipe</h3>
                                <p className="text-sm" style={{ color: '#8b7355' }}>Extracting recipe data...</p>
                                <p className="text-gray-500 text-xs mt-2">This may take 5–15 seconds</p>
                            </div>
                        </div>
                    )}
                    {view==='home' && <HomeView recipes={filteredRecipes} allRecipes={recipes} onAddClick={()=>setView('add')} onShoppingClick={()=>setView('shopping')} onMealPlanClick={()=>setView('mealplanner')} onRecipeClick={(r)=>{setSelectedRecipe(r);setCompletedSteps([]);setScaledServings(r.servings);setView('recipe');}} searchQuery={searchQuery} setSearchQuery={setSearchQuery} selectedFolder={selectedFolder} setSelectedFolder={setSelectedFolder} selectedTags={selectedTags} setSelectedTags={setSelectedTags} allFolders={allFolders} allTags={allTags} shoppingListCount={shoppingList.items.length+shoppingList.manualItems.length} mealPlanCount={Object.keys(mealPlan.days||{}).length} user={user} onLogout={()=>auth.signOut()} onSettings={()=>setView('settings')} onImageUpload={handleImageUpload} onPDFUpload={handlePDFUpload} canEdit={canEdit} />}
                    {view==='add' && canEdit && <AddRecipeView onBack={()=>setView('home')} onSubmit={handleAddRecipe} processing={processing} />}
                    {view==='edit' && selectedRecipe && canEdit && <AddRecipeView initialRecipe={selectedRecipe} onBack={()=>setView('recipe')} onSubmit={async(updatedRecipe)=>{setProcessing(true);await storage.updateRecipe(updatedRecipe.id,updatedRecipe);setSelectedRecipe(updatedRecipe);setScaledServings(updatedRecipe.servings);setProcessing(false);setView('recipe');}} processing={processing} unsplashKey={unsplashKey} />}
                    {view==='recipe' && selectedRecipe && <RecipeDetailView recipe={selectedRecipe} onBack={()=>setView('home')} onStartCooking={()=>setView('cooking')} onAddToShoppingList={async(servings)=>{await storage.addToShoppingList(user.uid,householdId,selectedRecipe,servings);toast(`"${selectedRecipe.name}" added to shopping list`,'success');}} scaledServings={scaledServings} setScaledServings={setScaledServings} onEdit={canEdit?()=>setView('edit'):null} onDelete={canEdit?async()=>{if(window.confirm(`Delete "${selectedRecipe.name}"?`)){await storage.deleteRecipe(selectedRecipe.id);setSelectedRecipe(null);setView('home');toast('Recipe deleted','info');}}:null} estimateNutrition={estimateNutrition} setSelectedRecipe={setSelectedRecipe} onAddToMealPlan={()=>{setMealPlannerPreselect(selectedRecipe);setView('mealplanner');}} canEdit={canEdit} />}
                    {view==='cooking' && selectedRecipe && <CookingModeView recipe={selectedRecipe} onExit={()=>setView('recipe')} completedSteps={completedSteps} setCompletedSteps={setCompletedSteps} scaledServings={scaledServings} />}
                    {view==='shopping' && <ShoppingListView shoppingList={shoppingList} onBack={()=>setView('home')} onToggleItem={async(id,isManual)=>await storage.toggleShoppingItem(user.uid,householdId,id,isManual)} onAddManualItem={async(item,amount,unit,category)=>await storage.addManualItem(user.uid,householdId,item,amount,unit,category)} onRemoveItem={async(id,isManual)=>await storage.removeShoppingItem(user.uid,householdId,id,isManual)} onEditItem={async(id,isManual,amount,unit)=>await storage.editShoppingItem(user.uid,householdId,id,isManual,amount,unit)} onRemoveRecipe={async(name)=>await storage.removeRecipeFromShoppingList(user.uid,householdId,name)} onClearList={async()=>{if(window.confirm('Clear entire shopping list?')){await storage.clearShoppingList(user.uid,householdId);toast('Shopping list cleared','info');}}} canEdit={canEdit} />}
                    {view==='mealplanner' && <MealPlannerView mealPlan={mealPlan} recipes={recipes} onBack={()=>{setMealPlannerPreselect(null);setView('home');}} onAddRecipe={async(dayKey,mealType,recipeId,servings,manualText)=>{if(recipeId==='manual')await storage.addManualEntryToMealPlan(user.uid,householdId,dayKey,mealType,manualText);else await storage.addRecipeToMealPlan(user.uid,householdId,dayKey,mealType,recipeId,servings);}} onRemoveRecipe={async(dayKey,mealType,index)=>await storage.removeRecipeFromMealPlan(user.uid,householdId,dayKey,mealType,index)} onUpdateNotes={async(dayKey,notes)=>await storage.updateDayNotes(user.uid,householdId,dayKey,notes)} onClearPlan={async()=>{if(window.confirm('Clear entire meal plan?')){await storage.clearMealPlan(user.uid,householdId);toast('Meal plan cleared','info');}}} onAddToShoppingList={async()=>{const count=await storage.addMealPlanToShoppingList(user.uid,householdId,recipes);toast(`${count} recipes added to shopping list`,'success');}} mealPlanPeople={mealPlanPeople} setMealPlanPeople={setMealPlanPeople} preselectedRecipe={mealPlannerPreselect} canEdit={canEdit} />}
                    {view==='preview' && extractedRecipe && <PreviewView recipe={extractedRecipe} images={extractedImages} onApprove={async(recipe)=>{await storage.addRecipe(recipe);setExtractedRecipe(null);setExtractedImages([]);setView('home');toast('Recipe saved!','success');}} onReject={()=>{setExtractedRecipe(null);setExtractedImages([]);setView('home');}} onEdit={(edited)=>setExtractedRecipe(edited)} />}
                    {view==='batch-preview' && batchExtractedRecipes.length>0 && (
                        <div className="max-w-6xl mx-auto px-4 py-8">
                            <div className="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6"><p className="text-blue-800 font-semibold">Batch Import — {batchExtractedRecipes.length} Recipes Extracted</p><p className="text-blue-700 text-sm mt-1">Review each recipe below.</p></div>
                            <div className="space-y-6">{batchExtractedRecipes.map((item,idx)=>(<div key={idx} className="rounded-lg shadow-md p-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}><div className="flex justify-between items-start mb-4"><div><h3 className="text-xl font-bold" style={{ color:'#3d2e1f' }}>{item.recipe.name}</h3><p className="text-sm text-gray-500">From: {item.filename}</p></div><button onClick={()=>setBatchExtractedRecipes(batchExtractedRecipes.filter((_,i)=>i!==idx))} className="text-red-600 hover:text-red-800">Remove</button></div><div className="grid grid-cols-2 gap-4 text-sm"><div><strong>Cuisine:</strong> {item.recipe.cuisine}</div><div><strong>Type:</strong> {item.recipe.dishType}</div><div><strong>Prep:</strong> {item.recipe.prepTime} min</div><div><strong>Cook:</strong> {item.recipe.cookTime} min</div></div></div>))}</div>
                            <div className="mt-8 flex gap-3">
                                <button onClick={()=>{setBatchExtractedRecipes([]);setView('home');}} className="flex-1 bg-red-600 text-white py-4 rounded-lg font-bold hover:bg-red-700 transition">✕ Cancel All</button>
                                <button onClick={async()=>{setProcessing(true);for(const item of batchExtractedRecipes)await storage.addRecipe(item.recipe);setBatchExtractedRecipes([]);setView('home');setProcessing(false);toast(`${batchExtractedRecipes.length} recipes imported!`,'success');}} className="flex-1 bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-700 transition">✓ Save All ({batchExtractedRecipes.length})</button>
                            </div>
                        </div>
                    )}
                    {view==='settings' && <SettingsView apiKey={apiKey} onSaveApiKey={setApiKey} unsplashKey={unsplashKey} onSaveUnsplashKey={setUnsplashKey} onBack={()=>setView('home')} recipes={recipes} processing={processing} estimateAllRecipes={estimateAllRecipes} getMissingIngredientsReport={getMissingIngredientsReport} importNewRecipes={importNewRecipes} household={household} householdId={householdId} userRole={userRole} userId={user.uid} userEmail={user.email} onHouseholdChange={async()=>{ const profile = await storage.getUserProfile(user.uid); const hid = profile.householdId||null; setHouseholdId(hid); if(hid){const h=await storage.getHousehold(hid);setHousehold(h);}else{setHousehold(null);} }} />}
                </div>
            );
        }

        // ─── HOME VIEW ────────────────────────────────────────────────────────────
        function HomeView({ recipes, allRecipes, onAddClick, onShoppingClick, onMealPlanClick, onRecipeClick, searchQuery, setSearchQuery, selectedFolder, setSelectedFolder, selectedTags, setSelectedTags, allFolders, allTags, shoppingListCount, mealPlanCount, user, onLogout, onSettings, onImageUpload, onPDFUpload, canEdit }) {
            const [addMenuOpen, setAddMenuOpen] = useState(false);
            const ORDERED_FOLDERS = ['Chicken','Fish & Seafood','Meat','Pasta','Noodles','Rice & Grains','Soups & Stews','Vegetarian','Salads & Light Meals','Traybakes','Japanese','Chinese','Indian','Asian','Middle Eastern','Condiments & Sauces','Juices & Drinks','Breakfast','Base'];
            const folders = ORDERED_FOLDERS.filter(f => allFolders.includes(f));

            return (
                <div className="min-h-screen" style={{ background:'#faf8f5' }}>
                    <div className="max-w-7xl mx-auto px-4 md:px-8 py-4 md:py-6">

                        {/* Header */}
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-3xl md:text-4xl font-semibold" style={{ color:'#3d2e1f' }}>Recipe Intelligence</h1>
                            <div className="flex gap-2 md:gap-3 items-center">
                                <div className="text-right mr-1 hidden md:block">
                                    <p className="text-xs" style={{ color:'#8b7355' }}>{user?.email}</p>
                                    <div className="flex gap-2 justify-end">
                                        <button onClick={onSettings} className="text-xs hover:opacity-80" style={{ color:'#d4a574' }}>⚙️ Settings</button>
                                        <span className="text-xs" style={{ color:'#e8dfd3' }}>•</span>
                                        <button onClick={onLogout} className="text-xs hover:opacity-80" style={{ color:'#d4a574' }}>Sign out</button>
                                    </div>
                                </div>
                                <button onClick={onShoppingClick} className="text-white px-3 md:px-5 py-2.5 rounded-xl font-semibold hover:opacity-90 transition relative text-sm" style={{ background:'#97c459' }}>
                                    🛒 <span className="hidden md:inline">Shopping</span>
                                    {shoppingListCount>0&&<span className="absolute -top-2 -right-2 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center" style={{ background:'#f5576c' }}>{shoppingListCount}</span>}
                                </button>
                                <button onClick={onMealPlanClick} className="text-white px-3 md:px-5 py-2.5 rounded-xl font-semibold hover:opacity-90 transition relative text-sm" style={{ background:'#FAC775' }}>
                                    📅 <span className="hidden md:inline">Meal Plan</span>
                                    {mealPlanCount>0&&<span className="absolute -top-2 -right-2 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center" style={{ background:'#f5576c' }}>{mealPlanCount}</span>}
                                </button>
                                {canEdit && <div className="relative">
                                    <button onClick={()=>setAddMenuOpen(!addMenuOpen)} className="text-white px-3 md:px-5 py-2.5 rounded-xl font-semibold hover:opacity-90 transition flex items-center gap-1 text-sm" style={{ background:'#d4a574' }}>
                                        <span>+</span><span className="hidden md:inline">Add Recipe</span>
                                    </button>
                                    {addMenuOpen && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={()=>setAddMenuOpen(false)} />
                                            <div className="absolute right-0 mt-2 w-56 rounded-xl shadow-xl z-20 overflow-hidden" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                                                <button onClick={()=>{onAddClick();setAddMenuOpen(false);}} className="w-full text-left px-4 py-3 hover:opacity-80 flex items-center gap-3 transition" style={{ background:'#f5ede1' }}>
                                                    <span className="text-xl">✏️</span><div><div className="font-semibold" style={{ color:'#3d2e1f' }}>Manual Entry</div><div className="text-xs" style={{ color:'#8b7355' }}>Type recipe details</div></div>
                                                </button>
                                                <label className="w-full text-left px-4 py-3 flex items-center gap-3 cursor-pointer transition block" style={{ background:'#f5ede1' }}>
                                                    <span className="text-xl">📷</span><div><div className="font-semibold" style={{ color:'#3d2e1f' }}>Upload Image</div><div className="text-xs" style={{ color:'#8b7355' }}>Photo or screenshot</div></div>
                                                    <input type="file" accept="image/*" onChange={e=>{onImageUpload(e);setAddMenuOpen(false);}} className="hidden" />
                                                </label>
                                                <label className="w-full text-left px-4 py-3 flex items-center gap-3 cursor-pointer transition block" style={{ background:'#f5ede1' }}>
                                                    <span className="text-xl">📄</span><div><div className="font-semibold" style={{ color:'#3d2e1f' }}>Upload PDFs</div><div className="text-xs" style={{ color:'#8b7355' }}>Single or multiple files</div></div>
                                                    <input type="file" accept=".pdf" multiple onChange={e=>{onPDFUpload(e);setAddMenuOpen(false);}} className="hidden" />
                                                </label>
                                                <div className="px-4 py-3" style={{ borderTop:'1px solid #e8dfd3',background:'#faf8f5' }}>
                                                    <div className="text-xs" style={{ color:'#8b7355' }}><strong>Bookmarklet:</strong> Visit a recipe website and click the bookmarklet</div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>}
                                {/* Mobile settings */}
                                <button onClick={onSettings} className="md:hidden p-2.5 rounded-xl hover:opacity-80 transition" style={{ background:'#f5ede1', color:'#6d5738' }}>⚙️</button>
                            </div>
                        </div>

                        {/* Search */}
                        <div className="mb-5">
                            <input type="text" placeholder="🔍 Search recipes, ingredients, or tags..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full px-4 py-3 rounded-xl focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} />
                        </div>

                        {/* Folder chips */}
                        <div className="flex flex-wrap gap-2 mb-8">
                            <button onClick={()=>setSelectedFolder(null)} className="px-4 py-1.5 rounded-full text-sm font-medium transition" style={selectedFolder===null?{background:'#d4a574',color:'white'}:{background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3'}}>All</button>
                            {folders.map(folder=>(
                                <button key={folder} onClick={()=>setSelectedFolder(selectedFolder===folder?null:folder)} className="px-4 py-1.5 rounded-full text-sm font-medium transition" style={selectedFolder===folder?{background:'#d4a574',color:'white'}:{background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3'}}>{folder}</button>
                            ))}
                        </div>

                        {/* Recipe grid */}
                        {recipes.length===0 ? (
                            <div className="text-center py-16">
                                <p className="text-gray-500 text-lg mb-4">{allRecipes.length===0 ? "No recipes yet!" : "No recipes match your filters."}</p>
                                {allRecipes.length===0&&(
                                    <div className="space-y-3">
                                        <button onClick={onAddClick} className="text-white px-8 py-3 rounded-lg font-semibold hover:opacity-90 transition mr-3" style={{ background:'#d4a574' }}>Create New Recipe</button>
                                        <button onClick={async()=>{if(confirm('Load 7 sample recipes to get started?')){const ok=await seedInitialRecipes();if(ok)toast('7 recipes loaded!','success');else toast('Error loading recipes.','error');}}} className="bg-green-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-green-700 transition">Load Sample Recipes</button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                {recipes.map(recipe=>(<RecipeCard key={recipe.id} recipe={recipe} onClick={()=>onRecipeClick(recipe)} />))}
                            </div>
                            )}
                    </div>
                </div>
            );
        }

        // ─── RECIPE CARD ──────────────────────────────────────────────────────────
        function RecipeCard({ recipe, onClick }) {
            const totalTime = (recipe.prepTime||0)+(recipe.cookTime||0);
            return (
                <div onClick={onClick} className="recipe-card rounded-xl shadow-sm overflow-hidden cursor-pointer">
                    {recipe.image ? <div className="h-48 bg-cover" style={{ backgroundImage:`url(${recipe.image})`, backgroundPosition:recipe.imagePosition||'50% 50%' }} /> : <div className="h-48 flex items-center justify-center" style={{ background:'linear-gradient(135deg, #d4a574 0%, #c4915f 100%)' }}><span className="text-white text-6xl">🍽️</span></div>}
                    <div className="p-4">
                        <h3 className="text-xl font-semibold mb-2" style={{ color:'#3d2e1f' }}>{recipe.name}</h3>
                        <div className="flex items-center gap-2 mb-3 text-sm" style={{ color:'#8b7355' }}>
                            {totalTime>0&&<span>⏱ {totalTime} min</span>}
                            {recipe.cuisine&&<span>• {recipe.cuisine}</span>}
                            {recipe.servings&&<span>• 👥 {recipe.servings}</span>}
                        </div>
                        {recipe.nutrition?.calories>0&&<div className="mt-2 text-sm" style={{ color:'#8b7355' }}>{recipe.nutrition.calories} cal • {recipe.nutrition.protein}g protein</div>}
                    </div>
                </div>
            );
        }

        // ─── PREVIEW VIEW ─────────────────────────────────────────────────────────
        function PreviewView({ recipe, images, onApprove, onReject, onEdit }) {
            const [editedRecipe, setEditedRecipe] = useState(recipe);
            const [selectedImage, setSelectedImage] = useState(recipe.image||null);

            return (
                <div className="max-w-4xl mx-auto px-4 py-8">
                    <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6"><p className="text-yellow-800 font-semibold">Preview Extracted Recipe</p><p className="text-yellow-700 text-sm mt-1">Review and edit if needed before saving</p></div>
                    <div className="rounded-lg shadow-md p-6 mb-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <h2 className="text-2xl font-bold mb-4" style={{ color:'#3d2e1f' }}>{editedRecipe.name}</h2>
                        <div className="mb-6">
                            <label className="block text-sm font-semibold mb-2" style={{ color:'#3d2e1f' }}>Recipe Source/Author (Optional)</label>
                            <input type="text" value={editedRecipe.source||''} onChange={e=>setEditedRecipe({...editedRecipe,source:e.target.value})} placeholder="e.g., Andy Cooks, MOB Kitchen, Em the Nutritionist" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" />
                            <p className="text-xs mt-1" style={{ color:'#8b7355' }}>Add the author or website where you found this recipe</p>
                        </div>
                        <div className="grid grid-cols-2 gap-4 mb-6 text-sm">
                            <div><strong>Cuisine:</strong> {editedRecipe.cuisine}</div><div><strong>Type:</strong> {editedRecipe.dishType}</div>
                            <div><strong>Prep:</strong> {editedRecipe.prepTime} min</div><div><strong>Cook:</strong> {editedRecipe.cookTime} min</div>
                            <div><strong>Servings:</strong> {editedRecipe.servings}</div><div><strong>Cost:</strong> {editedRecipe.costRating}</div>
                        </div>
                        <div className="mb-6">
                            <h3 className="font-bold mb-2">Ingredients ({editedRecipe.ingredients?.length})</h3>
                            <ul className="space-y-1 text-sm">{editedRecipe.ingredients?.map((ing,i)=>(<li key={i}>{ing.amount} {ing.unit} {ing.item}</li>))}</ul>
                        </div>
                        <div className="mb-6">

        function AddRecipeView({ onBack, onSubmit, processing, initialRecipe, unsplashKey }) {
            const [recipe, setRecipe] = useState({ name:initialRecipe?.name||'', cuisine:initialRecipe?.cuisine||'', dishType:initialRecipe?.dishType||'', cookingMethod:initialRecipe?.cookingMethod||'', prepTime:initialRecipe?.prepTime||0, cookTime:initialRecipe?.cookTime||0, servings:initialRecipe?.servings||4, tags:initialRecipe?.tags||[], folders:initialRecipe?.folders||[], image:initialRecipe?.image||'', imagePosition:initialRecipe?.imagePosition||'50% 50%', notes:initialRecipe?.notes||'', source:initialRecipe?.source||'' });

            // Compress image to max 800px wide and ~100KB before storing in Firestore
            const compressImage = (dataUrl) => new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 800, maxH = 600;
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.75));
                };
                img.src = dataUrl;
            });
            const [ingredients, setIngredients] = useState(initialRecipe?.ingredients?.length>0 ? initialRecipe.ingredients : [{item:'',amount:0,unit:'',category:'fresh'}]);
            const [steps, setSteps] = useState(initialRecipe?.steps?.length>0 ? initialRecipe.steps.map(s=>({instruction:s.instruction||'',duration:s.duration||0})) : [{instruction:'',duration:0}]);
            const [nutrition, setNutrition] = useState(initialRecipe?.nutrition||{calories:0,protein:0});
            const [costRating, setCostRating] = useState(initialRecipe?.costRating||'medium');
            const [currentTag, setCurrentTag] = useState('');
            const [showImageSearch, setShowImageSearch] = useState(false);
            const [unsplashImages, setUnsplashImages] = useState([]);
            const [searchingImages, setSearchingImages] = useState(false);

            const searchUnsplashImages = async () => {
                if (!unsplashKey) { toast('No Unsplash key set — add it in Settings','warning'); return; }
                setSearchingImages(true);
                try {
                    const query = encodeURIComponent(recipe.name || 'food');
                    const response = await fetch(`https://api.unsplash.com/search/photos?query=${query}%20food&per_page=9&client_id=${unsplashKey}`);
                    const data = await response.json();
                    if (data.errors) { toast('Unsplash error: ' + data.errors[0],'error'); return; }
                    if (data.results && data.results.length > 0) { setUnsplashImages(data.results); setShowImageSearch(true); }
                    else toast('No images found — try a different search','info');
                } catch(e) { toast('Could not search images. Please try again.','error'); }
                finally { setSearchingImages(false); }
            };
            const [currentFolder, setCurrentFolder] = useState('');

            const addIngredient = () => setIngredients([...ingredients,{item:'',amount:0,unit:'',category:'fresh'}]);
            const removeIngredient = (i) => setIngredients(ingredients.filter((_,idx)=>idx!==i));
            const updateIngredient = (i,field,value) => { const u=[...ingredients]; u[i][field]=value; setIngredients(u); };
            const addStep = () => setSteps([...steps,{instruction:'',duration:0}]);
            const removeStep = (i) => setSteps(steps.filter((_,idx)=>idx!==i));
            const updateStep = (i,field,value) => { const u=[...steps]; u[i][field]=value; setSteps(u); };
            const addTag = () => { if(currentTag.trim()&&!recipe.tags.includes(currentTag.trim())){setRecipe({...recipe,tags:[...recipe.tags,currentTag.trim()]});setCurrentTag('');} };
            const removeTag = (tag) => setRecipe({...recipe,tags:recipe.tags.filter(t=>t!==tag)});
            const addFolder = () => { if(currentFolder.trim()&&!recipe.folders.includes(currentFolder.trim())){setRecipe({...recipe,folders:[...recipe.folders,currentFolder.trim()]});setCurrentFolder('');} };
            const removeFolder = (f) => setRecipe({...recipe,folders:recipe.folders.filter(x=>x!==f)});

            const handleSubmit = (e) => {
                e.preventDefault();
                const finalRecipe = { ...(initialRecipe?.id&&{id:initialRecipe.id}), ...recipe, ingredients:ingredients.filter(i=>i.item.trim()), steps:steps.filter(s=>s.instruction.trim()).map((s,idx)=>({step:idx+1,instruction:s.instruction,duration:parseInt(s.duration)||0})), nutrition, costRating, confidence:'high' };

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="md:col-span-2"><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Recipe Name *</label><input type="text" value={recipe.name} onChange={e=>setRecipe({...recipe,name:e.target.value})} placeholder="e.g., Spaghetti Carbonara" className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} required /></div>
                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Cuisine</label><input type="text" value={recipe.cuisine} onChange={e=>setRecipe({...recipe,cuisine:e.target.value})} placeholder="e.g., Italian" className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} /></div>
                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Dish Type</label><input type="text" value={recipe.dishType} onChange={e=>setRecipe({...recipe,dishType:e.target.value})} placeholder="e.g., Main Course" className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} /></div>
                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Cooking Method</label><input type="text" value={recipe.cookingMethod} onChange={e=>setRecipe({...recipe,cookingMethod:e.target.value})} placeholder="e.g., Pan-frying" className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} /></div>
                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Source / Author</label><input type="text" value={recipe.source} onChange={e=>setRecipe({...recipe,source:e.target.value})} placeholder="e.g., MOB Kitchen, Jamie Oliver" className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} /></div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Recipe Image (optional)</label>

                                        <div>

                                                <div className="w-full h-full bg-cover" style={{ backgroundImage:`url(${recipe.image})`, backgroundPosition:recipe.imagePosition, backgroundSize:'cover' }} />
                                                <div className="absolute top-2 left-2 bg-black bg-opacity-50 text-white text-xs px-2 py-1 rounded">Drag sliders to reframe</div>
                                            </div>
                                            {/* Vertical position slider */}
                                            <div className="mb-2">
                                                <label className="text-xs mb-1 block" style={{ color:'#8b7355' }}>↕ Vertical position</label>
                                                <input type="range" min="0" max="100" value={parseInt(recipe.imagePosition.split(' ')[1]||50)} onChange={e=>{const x=recipe.imagePosition.split(' ')[0]||'50%'; setRecipe({...recipe,imagePosition:`${x} ${e.target.value}%`});}} className="w-full accent-amber-600" />
                                            </div>
                                            {/* Horizontal position slider */}
                                            <div className="mb-3">
                                                <label className="text-xs mb-1 block" style={{ color:'#8b7355' }}>↔ Horizontal position</label>
                                                <input type="range" min="0" max="100" value={parseInt(recipe.imagePosition.split(' ')[0]||50)} onChange={e=>{const y=recipe.imagePosition.split(' ')[1]||'50%'; setRecipe({...recipe,imagePosition:`${e.target.value}% ${y}`});}} className="w-full accent-amber-600" />
                                            </div>
                                            <div className="flex gap-2">
                                                <label className="flex-1 cursor-pointer text-center py-2 rounded-lg border-2 border-dashed border-gray-300 hover:border-indigo-400 transition text-sm" style={{ color:'#8b7355' }}>
                                                    📷 Replace
                                                    <input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=async ev=>{const compressed=await compressImage(ev.target.result);setRecipe({...recipe,image:compressed,imagePosition:'50% 50%'});};r.readAsDataURL(f);}}} className="hidden" />
                                                </label>
                                                <button type="button" onClick={searchUnsplashImages} disabled={searchingImages} className="flex-1 py-2 rounded-lg border-2 border-dashed border-gray-300 hover:border-indigo-400 transition text-sm disabled:opacity-50" style={{ color:'#8b7355' }}>{searchingImages?'⏳ Searching...':'🔍 Find on Unsplash'}</button>
                                                <button type="button" onClick={()=>setRecipe({...recipe,image:'',imagePosition:'50% 50%'})} className="py-2 px-3 rounded-lg border-2 border-dashed border-red-200 hover:border-red-400 transition text-sm text-red-500">✕</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex gap-2">
                                            <label className="flex-1 cursor-pointer">
                                                <div className="border-2 border-dashed border-gray-300 rounded-lg p-3 text-center hover:border-indigo-400 transition" style={{ color:'#8b7355' }}>📷 Upload image</div>
                                                <input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=async ev=>{const compressed=await compressImage(ev.target.result);setRecipe({...recipe,image:compressed,imagePosition:'50% 50%'});};r.readAsDataURL(f);}}} className="hidden" />
                                            </label>
                                            <button type="button" onClick={searchUnsplashImages} disabled={searchingImages} className="flex-1 border-2 border-dashed border-gray-300 rounded-lg p-3 text-center hover:border-indigo-400 transition disabled:opacity-50" style={{ color:'#8b7355' }}>
                                                {searchingImages ? '⏳ Searching...' : '🔍 Find on Unsplash'}

                                        </div>

                            </div>
                        </div>
                        <div className="border-b pb-6">
                            <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Time & Servings</h2>

                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Prep Time (minutes)</label><input type="number" min="0" value={recipe.prepTime} onChange={e=>setRecipe({...recipe,prepTime:parseInt(e.target.value)||0})} className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} /></div>
                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Cook Time (minutes)</label><input type="number" min="0" value={recipe.cookTime} onChange={e=>setRecipe({...recipe,cookTime:parseInt(e.target.value)||0})} className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} /></div>
                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Servings *</label><input type="number" min="1" value={recipe.servings} onChange={e=>setRecipe({...recipe,servings:parseInt(e.target.value)||1})} className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} required /></div>
                            </div>
                        </div>
                        <div className="border-b pb-6">
                            <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Ingredients</h2>
                            <div className="space-y-3">{ingredients.map((ing,index)=>(<div key={index} className="grid grid-cols-12 gap-2"><input type="number" step="0.1" value={ing.amount||''} onChange={e=>updateIngredient(index,'amount',parseFloat(e.target.value)||0)} placeholder="Amt" className="col-span-2 px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" /><input type="text" value={ing.unit} onChange={e=>updateIngredient(index,'unit',e.target.value)} placeholder="Unit" className="col-span-2 px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" /><input type="text" value={ing.item} onChange={e=>updateIngredient(index,'item',e.target.value)} placeholder="Ingredient name" className="col-span-4 px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" /><select value={ing.category} onChange={e=>updateIngredient(index,'category',e.target.value)} className="col-span-3 px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"><option value="fresh">Fresh</option><option value="pantry">Pantry</option><option value="specialty">Specialty</option></select><button type="button" onClick={()=>removeIngredient(index)} className="col-span-1 text-red-600 hover:text-red-800">✕</button></div>))}</div>
                            <button type="button" onClick={addIngredient} className="mt-3 font-semibold hover:opacity-80" style={{ color:'#d4a574' }}>+ Add Ingredient</button>
                        </div>
                        <div className="border-b pb-6">
                            <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Instructions</h2>
                            <div className="space-y-3">{steps.map((step,index)=>(<div key={index} className="flex gap-2"><div className="flex-shrink-0 w-8 h-8 text-white rounded-full flex items-center justify-center font-bold" style={{ background:'#d4a574' }}>{index+1}</div><textarea value={step.instruction} onChange={e=>updateStep(index,'instruction',e.target.value)} placeholder="Describe this step..." rows="2" className="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" /><input type="number" min="0" value={step.duration||''} onChange={e=>updateStep(index,'duration',parseInt(e.target.value)||0)} placeholder="Mins" className="w-20 px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" /><button type="button" onClick={()=>removeStep(index)} className="text-red-600 hover:text-red-800">✕</button></div>))}</div>
                            <button type="button" onClick={addStep} className="mt-3 font-semibold hover:opacity-80" style={{ color:'#d4a574' }}>+ Add Step</button>
                        </div>
                        <div className="border-b pb-6">

                            <div className="mb-4">
                                <label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Tags</label>
                                <div className="flex gap-2 mb-2"><input type="text" value={currentTag} onChange={e=>setCurrentTag(e.target.value)} onKeyPress={e=>e.key==='Enter'&&(e.preventDefault(),addTag())} placeholder="e.g., quick, healthy, vegetarian" className="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" /><button type="button" onClick={addTag} className="text-white px-4 py-2 rounded-lg hover:opacity-90" style={{ background:'#d4a574' }}>Add</button></div>
                                <div className="flex flex-wrap gap-2">{recipe.tags.map(tag=>(<span key={tag} className="px-3 py-1 rounded-full text-sm flex items-center gap-2" style={{ background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3' }}>#{tag}<button type="button" onClick={()=>removeTag(tag)} className="text-red-600">✕</button></span>))}</div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Folders</label>
                                <div className="flex gap-2 mb-2"><input type="text" value={currentFolder} onChange={e=>setCurrentFolder(e.target.value)} onKeyPress={e=>e.key==='Enter'&&(e.preventDefault(),addFolder())} placeholder="e.g., Weeknight Dinners" className="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" /><button type="button" onClick={addFolder} className="text-white px-4 py-2 rounded-lg hover:opacity-90" style={{ background:'#d4a574' }}>Add</button></div>
                                <div className="flex flex-wrap gap-2">{recipe.folders.map(f=>(<span key={f} className="px-3 py-1 rounded-full text-sm flex items-center gap-2" style={{ background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3' }}>📁 {f}<button type="button" onClick={()=>removeFolder(f)} className="text-red-600">✕</button></span>))}</div>
                            </div>
                        </div>
                        <div className="border-b pb-6">
                            <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Additional Info</h2>

                                <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Cost Rating</label><select value={costRating} onChange={e=>setCostRating(e.target.value)} className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }}><option value="low">Low</option><option value="medium">Medium</option><option value="medium-high">Medium-High</option><option value="high">High</option></select></div>
                            </div>
                            <div><label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Notes (optional)</label><textarea value={recipe.notes} onChange={e=>setRecipe({...recipe,notes:e.target.value})} rows="3" placeholder="Any tips, variations, or additional notes..." className="w-full px-4 py-2 rounded-lg focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} /></div>

                        <div className="flex gap-3">
                            <button type="button" onClick={onBack} className="flex-1 bg-gray-300 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-400 transition">Cancel</button>
                            <button type="submit" disabled={processing} className="flex-1 text-white py-3 rounded-xl font-semibold hover:opacity-90 transition disabled:opacity-50" style={{ background:'#d4a574' }}>{processing ? 'Saving...' : (initialRecipe ? 'Save Changes' : 'Create Recipe')}</button>
