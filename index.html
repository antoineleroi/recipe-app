            const lookupIngredient = async (ingredientName) => {
                const normalized = normalizeIngredient(ingredientName);

                // 1. Check local database first (instant, no API)
                if (LOCAL_NUTRITION[normalized]) return LOCAL_NUTRITION[normalized];

                // 2. Try partial match in local db (e.g. "chicken thighs skinless and boneless" → "chicken thigh")
                for (const [key, val] of Object.entries(LOCAL_NUTRITION)) {
                    if (normalized.includes(key) || key.includes(normalized)) return val;
                }

                // 3. Try Firebase cache
                try {
                    const snapshot = await db.collection('ingredientNutrition').where('name','==',normalized).limit(1).get();
                    if (!snapshot.empty) return snapshot.docs[0].data();
                } catch(e) {}

                // 4. Fall back to USDA
                try {
                    const response = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(normalized)}&pageSize=1&api_key=DEMO_KEY`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.foods && data.foods.length > 0) {
                            const food = data.foods[0];
                            const getNutrient = (name) => { const n = food.foodNutrients.find(n => n.nutrientName.toLowerCase().includes(name.toLowerCase())); return n ? parseFloat(n.value)||0 : 0; };
                            const result = { calories:getNutrient('energy'), protein:getNutrient('protein'), carbs:getNutrient('carbohydrate'), fat:getNutrient('total lipid'), fiber:getNutrient('fiber'), sugar:getNutrient('sugars') };
                            try { await db.collection('ingredientNutrition').add({ name:normalized, ...result, source:'usda', addedAt:new Date() }); } catch(e) {}
                            return result;
                        }
                    }
                } catch(e) {}

                return null;
            };
            const importNewRecipes = async () => {
                if (!window.confirm(`This will add any recipes from the built-in library that aren't already in your collection.\n\nCurrent recipes: ${recipes.length}\nBuilt-in library: ${initialRecipes.length}\n\nProceed?`)) return;
                setProcessing(true);
                let added = 0, skipped = 0;
                try {
                    const existingNames = new Set(recipes.map(r => r.name.toLowerCase().trim()));
                    const deletedNames = new Set(await storage.getDeletedLibraryRecipes(householdId));
                    for (const recipe of initialRecipes) {
                        const key = recipe.name.toLowerCase().trim();
                        if (existingNames.has(key) || deletedNames.has(key)) { skipped++; }
                        else { await storage.addRecipe(recipe); added++; }
                    }
                    toast(`${added} new recipes added, ${skipped} already existed`, 'success', 5000);
                } catch(e) { toast('Error importing recipes: ' + e.message, 'error'); }
                finally { setProcessing(false); }
            };

            const estimateAllRecipes = async () => {
                if (!window.confirm(`Estimate nutrition for all ${recipes.length} recipes?\n\nThis will take about ${Math.ceil(recipes.length * 3)} seconds.`)) return;
                setProcessing(true);
                let succeeded = 0, failed = 0;
                try {
                    for (const recipe of recipes) {
                        if (recipe.nutrition?.calories) { continue; }
                        try {
                            const nutrition = await estimateNutrition(recipe);
                            if (nutrition) { await db.collection('recipes').doc(recipe.id).update({ nutrition, nutritionEstimatedAt: new Date() }); succeeded++; }
                            else failed++;
                        } catch(e) { console.error(`Error estimating ${recipe.name}:`, e); failed++; }
                    }
                    toast(`${succeeded} recipes estimated${failed>0?`, ${failed} failed`:''}`, failed>0?'warning':'success', 5000);
                } catch(e) { toast('Error during batch estimation: ' + e.message, 'error'); }
                finally { setProcessing(false); }
            };
            const getMissingIngredientsReport = async () => {
                try {
                    const snapshot = await db.collection('missingIngredients').get();
                    if (snapshot.empty) { toast('No missing ingredients — all have nutrition data','success'); return; }
                    const docs = snapshot.docs.map(doc => doc.data()).sort((a,b) => (b.count||0) - (a.count||0));
                    const missing = docs.map(d => `• ${d.name} — needed in ${d.count||1} recipe${(d.count||1)>1?'s':''}`);
                    const report = `Missing Ingredients (${missing.length} total):\n\n${missing.join('\n')}`;
                    try { await navigator.clipboard.writeText(report); toast('Missing ingredients report copied to clipboard','success'); }
                    catch(e) { toast('Could not copy — check console','error'); }
                } catch(e) {
                    if (e.code === 'permission-denied' || e.message?.includes('permission')) {
                        toast('No data yet — run Estimate All Recipes first','warning');
                    } else {
                        toast('Error generating report: ' + e.message, 'error');
                    }
                }
            };
            const estimateNutrition = async (recipe) => {
                setProcessing(true);
                try {
                    let total = { calories:0,protein:0,carbs:0,fat:0,fiber:0,sugar:0 };
                    let foundCount=0, missing=[];
                    for (const ing of recipe.ingredients) {
                        if (shouldSkipIngredient(ing.item, ing.unit)) continue;
                        const nd = await lookupIngredient(ing.item);
                        if (nd) { const factor = convertToBaseUnit(ing.amount,ing.unit)/100; Object.keys(total).forEach(k=>total[k]+=nd[k]*factor); foundCount++; }
                        else missing.push(ing.item);
                    }
                    const servings = recipe.servings||1;
                    const perServing = { calories:Math.round(total.calories/servings), protein:Math.round(total.protein/servings*10)/10, carbs:Math.round(total.carbs/servings*10)/10, fat:Math.round(total.fat/servings*10)/10, fiber:Math.round(total.fiber/servings*10)/10, sugar:Math.round(total.sugar/servings*10)/10 };
                    if (missing.length>0) toast(`Estimated ${foundCount}/${recipe.ingredients.length} ingredients. Missing: ${missing.slice(0,3).join(', ')}${missing.length>3?'…':''}`, 'warning', 6000);
                    return perServing;
                } catch(e) { toast('Error estimating nutrition: '+e.message, 'error'); return null; }
                finally { setProcessing(false); }
            };

            useEffect(() => {
                if (!user) return;
                setLoading(true);

                let unsubShopping = () => {};
                let unsubMealPlan = () => {};

                const setupDataListeners = (hid) => {
                    unsubShopping();
                    unsubMealPlan();
                    const dataPath = hid
                        ? db.collection('households').doc(hid).collection('data')
                        : db.collection('users').doc(user.uid).collection('data');
                    unsubShopping = dataPath.doc('shoppingList').onSnapshot(doc => {
                        if (doc.exists) setShoppingList(doc.data());
                        else setShoppingList({ items:[], manualItems:[] });
                    });
                    unsubMealPlan = dataPath.doc('mealPlan').onSnapshot(doc => {
                        if (doc.exists) setMealPlan(doc.data());
                        else setMealPlan({ days:{} });
                    });
                };

                // Single profile listener — handles household state AND data path routing
                const unsubProfile = db.collection('users').doc(user.uid).onSnapshot(async (doc) => {
                    const profile = doc.exists ? doc.data() : {};
                    const hid = profile.householdId || null;
                    const role = profile.role || null;
                    setHouseholdId(hid);
                    setUserRole(role);
                    if (hid) {
                        const hDoc = await db.collection('households').doc(hid).get();
                        if (hDoc.exists) setHousehold({ id: hDoc.id, ...hDoc.data() });
                    } else {
                        setHousehold(null);
                    }
                    setupDataListeners(hid);
                });

                const unsubRecipes = db.collection('recipes').onSnapshot((snapshot) => {
                    setRecipes(snapshot.docs.map(doc=>({id:doc.id,...doc.data()})));
                    setLoading(false);
                });

                return () => { unsubProfile(); unsubRecipes(); unsubShopping(); unsubMealPlan(); };
            }, [user]);

            useEffect(() => {
                const handleMessage = async (event) => {
                    if (event.data && event.data.type === 'RECIPE_EXTRACT') {
                        // Confirm receipt so bookmarklet stops retrying
                        if (event.source) event.source.postMessage({ type: 'RECIPE_RECEIVED' }, '*');
                        setProcessing(true);
                        try { const extracted = await extractRecipeFromText(event.data.text); setExtractedRecipe(extracted); setView('preview'); }
                        catch(err) { toast('Error extracting recipe: '+err.message, 'error'); }
                        finally { setProcessing(false); }
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, [apiKey]);

            const handleAddRecipe = async (input) => {
                setProcessing(true);
                try {
                    const processedRecipe = (input.name && input.ingredients && input.steps) ? input : (() => { throw new Error('Invalid recipe data'); })();
                    await storage.addRecipe(processedRecipe);
                    setView('home');
                    toast(`"${processedRecipe.name}" saved!`, 'success');
                } catch(err) { toast('Error saving recipe: '+err.message, 'error'); }
                finally { setProcessing(false); }
            };

            const filteredRecipes = recipes.filter(recipe => {
                if (searchQuery) { const q=searchQuery.trim().toLowerCase(); if(!recipe.name?.toLowerCase().includes(q)&&!recipe.ingredients?.some(i=>i.item.toLowerCase().includes(q))&&!recipe.tags?.some(t=>t.toLowerCase().includes(q)))return false; }
                if (selectedFolder === 'Low Calorie') { if (!isLowCalMeal(recipe)) return false; }
                else if (selectedFolder && !recipe.folders?.includes(selectedFolder)) return false;
                if (selectedTags.length>0 && !selectedTags.every(tag=>recipe.tags?.includes(tag))) return false;
                return true;
            }).sort((a,b)=>a.name.localeCompare(b.name));

            const allFolders = storage.getAllFolders(recipes);
            const allTags = storage.getAllTags(recipes);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center" style={{ background: '#faf8f5' }}>
                    <div className="text-center">
                        <div className="animate-spin rounded-full h-16 w-16 border-b-4 mx-auto mb-4" style={{ borderColor: '#d4a574' }}></div>
                        <p style={{ color: '#8b7355' }}>Loading your recipes...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen" style={{ background: '#faf8f5' }}>
                    {processing && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
                            <div className="rounded-lg p-8 max-w-sm mx-4 text-center shadow-2xl" style={{ background: '#fffef9' }}>
                                <div className="animate-spin rounded-full h-16 w-16 border-b-4 mx-auto mb-4" style={{ borderColor: '#d4a574' }}></div>
                                <h3 className="text-xl font-bold mb-2" style={{ color: '#3d2e1f' }}>Processing Recipe</h3>
                                <p className="text-sm" style={{ color: '#8b7355' }}>Extracting recipe data...</p>
                                <p className="text-gray-500 text-xs mt-2">This may take 5–15 seconds</p>
                            </div>
                        </div>
                    )}
                    {view==='home' && <HomeView recipes={filteredRecipes} allRecipes={recipes} onAddClick={()=>setView('add')} onShoppingClick={()=>setView('shopping')} onMealPlanClick={()=>setView('mealplanner')} onRecipeClick={(r)=>{setSelectedRecipe(r);setCompletedSteps([]);setScaledServings(r.servings);setView('recipe');}} searchQuery={searchQuery} setSearchQuery={setSearchQuery} selectedFolder={selectedFolder} setSelectedFolder={setSelectedFolder} selectedTags={selectedTags} setSelectedTags={setSelectedTags} allFolders={allFolders} allTags={allTags} shoppingListCount={shoppingList.items.length+shoppingList.manualItems.length} mealPlanCount={Object.keys(mealPlan.days||{}).length} user={user} onLogout={()=>auth.signOut()} onSettings={()=>setView('settings')} onImageUpload={handleImageUpload} onPDFUpload={handlePDFUpload} canEdit={canEdit} />}
                    {view==='add' && canEdit && <AddRecipeView onBack={()=>setView('home')} onSubmit={handleAddRecipe} processing={processing} />}
                    {view==='edit' && selectedRecipe && canEdit && <AddRecipeView initialRecipe={selectedRecipe} onBack={()=>setView('recipe')} onSubmit={async(updatedRecipe)=>{setProcessing(true);await storage.updateRecipe(updatedRecipe.id,updatedRecipe);setSelectedRecipe(updatedRecipe);setScaledServings(updatedRecipe.servings);setProcessing(false);setView('recipe');}} processing={processing} unsplashKey={unsplashKey} />}
                    {view==='recipe' && selectedRecipe && <RecipeDetailView recipe={selectedRecipe} onBack={()=>setView('home')} onStartCooking={()=>setView('cooking')} onAddToShoppingList={async(servings)=>{await storage.addToShoppingList(user.uid,householdId,selectedRecipe,servings);toast(`"${selectedRecipe.name}" added to shopping list`,'success');}} scaledServings={scaledServings} setScaledServings={setScaledServings} onEdit={canEdit?()=>setView('edit'):null} onDelete={canEdit?async()=>{if(window.confirm(`Delete "${selectedRecipe.name}"?`)){await storage.deleteRecipe(selectedRecipe.id);if(householdId)await storage.addToDeletedLibraryRecipes(householdId,selectedRecipe.name);setSelectedRecipe(null);setView('home');toast('Recipe deleted','info');}}:null} estimateNutrition={estimateNutrition} setSelectedRecipe={setSelectedRecipe} onAddToMealPlan={()=>{setMealPlannerPreselect(selectedRecipe);setView('mealplanner');}} canEdit={canEdit} />}
                    {view==='cooking' && selectedRecipe && <CookingModeView recipe={selectedRecipe} onExit={()=>setView('recipe')} completedSteps={completedSteps} setCompletedSteps={setCompletedSteps} scaledServings={scaledServings} />}
                    {view==='shopping' && <ShoppingListView shoppingList={shoppingList} onBack={()=>setView('home')} onToggleItem={async(id,isManual)=>await storage.toggleShoppingItem(user.uid,householdId,id,isManual)} onAddManualItem={async(item,amount,unit,category)=>await storage.addManualItem(user.uid,householdId,item,amount,unit,category)} onRemoveItem={async(id,isManual)=>await storage.removeShoppingItem(user.uid,householdId,id,isManual)} onEditItem={async(id,isManual,amount,unit)=>await storage.editShoppingItem(user.uid,householdId,id,isManual,amount,unit)} onRemoveRecipe={async(name)=>await storage.removeRecipeFromShoppingList(user.uid,householdId,name)} onClearList={async()=>{if(window.confirm('Clear entire shopping list?')){await storage.clearShoppingList(user.uid,householdId);toast('Shopping list cleared','info');}}} canEdit={canEdit} />}
                    {view==='mealplanner' && <MealPlannerView mealPlan={mealPlan} recipes={recipes} onBack={()=>{setMealPlannerPreselect(null);setView('home');}} onAddRecipe={async(dayKey,mealType,recipeId,servings,manualText)=>{if(recipeId==='manual')await storage.addManualEntryToMealPlan(user.uid,householdId,dayKey,mealType,manualText);else await storage.addRecipeToMealPlan(user.uid,householdId,dayKey,mealType,recipeId,servings);}} onRemoveRecipe={async(dayKey,mealType,index)=>await storage.removeRecipeFromMealPlan(user.uid,householdId,dayKey,mealType,index)} onUpdateNotes={async(dayKey,notes)=>await storage.updateDayNotes(user.uid,householdId,dayKey,notes)} onClearPlan={async()=>{if(window.confirm('Clear entire meal plan?')){await storage.clearMealPlan(user.uid,householdId);toast('Meal plan cleared','info');}}} onAddToShoppingList={async()=>{const count=await storage.addMealPlanToShoppingList(user.uid,householdId,recipes);toast(`${count} recipes added to shopping list`,'success');}} mealPlanPeople={mealPlanPeople} setMealPlanPeople={setMealPlanPeople} preselectedRecipe={mealPlannerPreselect} canEdit={canEdit} />}
                    {view==='preview' && extractedRecipe && <PreviewView recipe={extractedRecipe} images={extractedImages} onApprove={async(recipe)=>{await storage.addRecipe(recipe);setExtractedRecipe(null);setExtractedImages([]);setView('home');toast('Recipe saved!','success');}} onReject={()=>{setExtractedRecipe(null);setExtractedImages([]);setView('home');}} onEdit={(edited)=>setExtractedRecipe(edited)} />}
                    {view==='batch-preview' && batchExtractedRecipes.length>0 && (
                        <div className="max-w-6xl mx-auto px-4 py-8">
                            <div className="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6"><p className="text-blue-800 font-semibold">Batch Import — {batchExtractedRecipes.length} Recipes Extracted</p><p className="text-blue-700 text-sm mt-1">Review each recipe below.</p></div>
                            <div className="space-y-6">{batchExtractedRecipes.map((item,idx)=>(<div key={idx} className="rounded-lg shadow-md p-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}><div className="flex justify-between items-start mb-4"><div><h3 className="text-xl font-bold" style={{ color:'#3d2e1f' }}>{item.recipe.name}</h3><p className="text-sm text-gray-500">From: {item.filename}</p></div><button onClick={()=>setBatchExtractedRecipes(batchExtractedRecipes.filter((_,i)=>i!==idx))} className="text-red-600 hover:text-red-800">Remove</button></div><div className="grid grid-cols-2 gap-4 text-sm"><div><strong>Cuisine:</strong> {item.recipe.cuisine}</div><div><strong>Type:</strong> {item.recipe.dishType}</div><div><strong>Prep:</strong> {item.recipe.prepTime} min</div><div><strong>Cook:</strong> {item.recipe.cookTime} min</div></div></div>))}</div>
                            <div className="mt-8 flex gap-3">
                                <button onClick={()=>{setBatchExtractedRecipes([]);setView('home');}} className="flex-1 bg-red-600 text-white py-4 rounded-lg font-bold hover:bg-red-700 transition">✕ Cancel All</button>
                                <button onClick={async()=>{setProcessing(true);for(const item of batchExtractedRecipes)await storage.addRecipe(item.recipe);setBatchExtractedRecipes([]);setView('home');setProcessing(false);toast(`${batchExtractedRecipes.length} recipes imported!`,'success');}} className="flex-1 bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-700 transition">✓ Save All ({batchExtractedRecipes.length})</button>
                            </div>
                        </div>
                    )}
                    {view==='settings' && <SettingsView apiKey={apiKey} onSaveApiKey={setApiKey} unsplashKey={unsplashKey} onSaveUnsplashKey={setUnsplashKey} onBack={()=>setView('home')} recipes={recipes} processing={processing} estimateAllRecipes={estimateAllRecipes} getMissingIngredientsReport={getMissingIngredientsReport} importNewRecipes={importNewRecipes} household={household} householdId={householdId} userRole={userRole} userId={user.uid} userEmail={user.email} onHouseholdChange={async()=>{ const profile = await storage.getUserProfile(user.uid); const hid = profile.householdId||null; setHouseholdId(hid); if(hid){const h=await storage.getHousehold(hid);setHousehold(h);}else{setHousehold(null);} }} />}
                </div>
            );
        }

        // ─── HOME VIEW ────────────────────────────────────────────────────────────
        function HomeView({ recipes, allRecipes, onAddClick, onShoppingClick, onMealPlanClick, onRecipeClick, searchQuery, setSearchQuery, selectedFolder, setSelectedFolder, selectedTags, setSelectedTags, allFolders, allTags, shoppingListCount, mealPlanCount, user, onLogout, onSettings, onImageUpload, onPDFUpload, canEdit }) {
            const [addMenuOpen, setAddMenuOpen] = useState(false);
            const ORDERED_FOLDERS = ['Chicken','Fish & Seafood','Meat','Pasta','Noodles','Rice & Grains','Soups & Stews','Vegetarian','Low Calorie','Salads','Traybakes','Starters & Small Plates','Japanese','Chinese','Korean','Indian','South East Asian','Asian','Middle Eastern','French','Mexican & Latin','Caribbean','Condiments & Sauces','Juices & Drinks','Breakfast','Base','Dessert'];
            const LOW_CAL_EXCLUDED_TYPES = ['juice','drink','smoothie','shot','sauce','dip','dressing','pickle','condiment','stock','broth','dessert','pudding','cake','pastry'];
            const isLowCalMeal = (r) => r.nutrition?.calories > 0 && r.nutrition.calories < 500 && !LOW_CAL_EXCLUDED_TYPES.some(t => (r.dishType||'').toLowerCase().includes(t)) && !['Juices & Drinks','Condiments & Sauces','Base','Dessert'].some(f => (r.folders||[]).includes(f));
            const folders = ['Low Calorie', ...ORDERED_FOLDERS.filter(f => f !== 'Low Calorie' && allFolders.includes(f))];

            return (
                <div className="min-h-screen" style={{ background:'#faf8f5' }}>
                    <div className="max-w-7xl mx-auto px-4 md:px-8 py-4 md:py-6">

                        {/* Header */}
                        <div className="flex justify-between items-center mb-6">
                            <h1 className="text-3xl md:text-4xl font-semibold" style={{ color:'#3d2e1f' }}>Recipe Intelligence</h1>
                            <div className="flex gap-2 md:gap-3 items-center">
                                <div className="text-right mr-1 hidden md:block">
                                    <p className="text-xs" style={{ color:'#8b7355' }}>{user?.email}</p>
                                    <div className="flex gap-2 justify-end">
                                        <button onClick={onSettings} className="text-xs hover:opacity-80" style={{ color:'#d4a574' }}>⚙️ Settings</button>
                                        <span className="text-xs" style={{ color:'#e8dfd3' }}>•</span>
                                        <button onClick={onLogout} className="text-xs hover:opacity-80" style={{ color:'#d4a574' }}>Sign out</button>
                                    </div>
                                </div>
                                <button onClick={onShoppingClick} className="text-white px-3 md:px-5 py-2.5 rounded-xl font-semibold hover:opacity-90 transition relative text-sm" style={{ background:'#97c459' }}>
                                    🛒 <span className="hidden md:inline">Shopping</span>
                                    {shoppingListCount>0&&<span className="absolute -top-2 -right-2 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center" style={{ background:'#f5576c' }}>{shoppingListCount}</span>}
                                </button>
                                <button onClick={onMealPlanClick} className="text-white px-3 md:px-5 py-2.5 rounded-xl font-semibold hover:opacity-90 transition relative text-sm" style={{ background:'#FAC775' }}>
                                    📅 <span className="hidden md:inline">Meal Plan</span>
                                    {mealPlanCount>0&&<span className="absolute -top-2 -right-2 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center" style={{ background:'#f5576c' }}>{mealPlanCount}</span>}
                                </button>
                                {canEdit && <div className="relative">
                                    <button onClick={()=>setAddMenuOpen(!addMenuOpen)} className="text-white px-3 md:px-5 py-2.5 rounded-xl font-semibold hover:opacity-90 transition flex items-center gap-1 text-sm" style={{ background:'#d4a574' }}>
                                        <span>+</span><span className="hidden md:inline">Add Recipe</span>
                                    </button>
                                    {addMenuOpen && (
                                        <>
                                            <div className="fixed inset-0 z-10" onClick={()=>setAddMenuOpen(false)} />
                                            <div className="absolute right-0 mt-2 w-56 rounded-xl shadow-xl z-20 overflow-hidden" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                                                <button onClick={()=>{onAddClick();setAddMenuOpen(false);}} className="w-full text-left px-4 py-3 hover:opacity-80 flex items-center gap-3 transition" style={{ background:'#f5ede1' }}>
                                                    <span className="text-xl">✏️</span><div><div className="font-semibold" style={{ color:'#3d2e1f' }}>Manual Entry</div><div className="text-xs" style={{ color:'#8b7355' }}>Type recipe details</div></div>
                                                </button>
                                                <label className="w-full text-left px-4 py-3 flex items-center gap-3 cursor-pointer transition block" style={{ background:'#f5ede1' }}>
                                                    <span className="text-xl">📷</span><div><div className="font-semibold" style={{ color:'#3d2e1f' }}>Upload Image</div><div className="text-xs" style={{ color:'#8b7355' }}>Photo or screenshot</div></div>
                                                    <input type="file" accept="image/*" onChange={e=>{onImageUpload(e);setAddMenuOpen(false);}} className="hidden" />
                                                </label>
                                                <label className="w-full text-left px-4 py-3 flex items-center gap-3 cursor-pointer transition block" style={{ background:'#f5ede1' }}>
                                                    <span className="text-xl">📄</span><div><div className="font-semibold" style={{ color:'#3d2e1f' }}>Upload PDFs</div><div className="text-xs" style={{ color:'#8b7355' }}>Single or multiple files</div></div>
                                                    <input type="file" accept=".pdf" multiple onChange={e=>{onPDFUpload(e);setAddMenuOpen(false);}} className="hidden" />
                                                </label>
                                                <div className="px-4 py-3" style={{ borderTop:'1px solid #e8dfd3',background:'#faf8f5' }}>
                                                    <div className="text-xs" style={{ color:'#8b7355' }}><strong>Bookmarklet:</strong> Visit a recipe website and click the bookmarklet</div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>}
                                {/* Mobile settings */}
                                <button onClick={onSettings} className="md:hidden p-2.5 rounded-xl hover:opacity-80 transition" style={{ background:'#f5ede1', color:'#6d5738' }}>⚙️</button>
                            </div>
                        </div>

                        {/* Search */}
                        <div className="mb-5">
                            <input type="text" placeholder="🔍 Search recipes, ingredients, or tags..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full px-4 py-3 rounded-xl focus:outline-none transition" style={{ border:'2px solid #e8dfd3',background:'#fffef9' }} />
                        </div>

                        {/* Folder chips */}
                        <div className="flex flex-wrap gap-2 mb-8">
                            <button onClick={()=>setSelectedFolder(null)} className="px-4 py-1.5 rounded-full text-sm font-medium transition" style={selectedFolder===null?{background:'#d4a574',color:'white'}:{background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3'}}>All</button>
                            {folders.map(folder=>(
                                <button key={folder} onClick={()=>setSelectedFolder(selectedFolder===folder?null:folder)} className="px-4 py-1.5 rounded-full text-sm font-medium transition" style={selectedFolder===folder?{background:'#d4a574',color:'white'}:{background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3'}}>{folder}</button>
                            ))}
                        </div>

                        {/* Recipe grid */}
                        {recipes.length===0 ? (
                            <div className="text-center py-16">
                                <p className="text-gray-500 text-lg mb-4">{allRecipes.length===0 ? "No recipes yet!" : "No recipes match your filters."}</p>
                                {allRecipes.length===0&&(
                                    <div className="space-y-3">
                                        <button onClick={onAddClick} className="text-white px-8 py-3 rounded-lg font-semibold hover:opacity-90 transition mr-3" style={{ background:'#d4a574' }}>Create New Recipe</button>
                                        <button onClick={async()=>{if(confirm('Load 7 sample recipes to get started?')){const ok=await seedInitialRecipes();if(ok)toast('7 recipes loaded!','success');else toast('Error loading recipes.','error');}}} className="bg-green-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-green-700 transition">Load Sample Recipes</button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                {recipes.map(recipe=>(<RecipeCard key={recipe.id} recipe={recipe} onClick={()=>onRecipeClick(recipe)} />))}
                            </div>
                            )}
                    </div>
                </div>
            );
        }

        // ─── RECIPE CARD ──────────────────────────────────────────────────────────
        function RecipeCard({ recipe, onClick }) {
            const totalTime = (recipe.prepTime||0)+(recipe.cookTime||0);
            return (
                <div onClick={onClick} className="recipe-card rounded-xl shadow-sm overflow-hidden cursor-pointer">
                    {recipe.image ? <div className="h-48 bg-cover" style={{ backgroundImage:`url(${recipe.image})`, backgroundPosition:recipe.imagePosition||'50% 50%' }} /> : <div className="h-48 flex items-center justify-center" style={{ background:'linear-gradient(135deg, #d4a574 0%, #c4915f 100%)' }}><span className="text-white text-6xl">🍽️</span></div>}
                    <div className="p-4">
                        <h3 className="text-xl font-semibold mb-2" style={{ color:'#3d2e1f' }}>{recipe.name}</h3>
                        <div className="flex items-center gap-2 mb-3 text-sm" style={{ color:'#8b7355' }}>
                            {totalTime>0&&<span>⏱ {totalTime} min</span>}
                            {recipe.cuisine&&<span>• {recipe.cuisine}</span>}
                            {recipe.servings&&<span>• 👥 {recipe.servings}</span>}
                        </div>
                        {recipe.nutrition?.calories>0&&<div className="mt-2 text-sm" style={{ color:'#8b7355' }}>{recipe.nutrition.calories} cal • {recipe.nutrition.protein}g protein</div>}
                    </div>
                </div>
            );
        }

        // ─── PREVIEW VIEW ─────────────────────────────────────────────────────────
        function PreviewView({ recipe, images, onApprove, onReject, onEdit }) {
            const [editedRecipe, setEditedRecipe] = useState(recipe);
            const [selectedImage, setSelectedImage] = useState(recipe.image||null);

            return (
                <div className="max-w-4xl mx-auto px-4 py-8">
                    <div className="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6"><p className="text-yellow-800 font-semibold">Preview Extracted Recipe</p><p className="text-yellow-700 text-sm mt-1">Review and edit if needed before saving</p></div>
                    <div className="rounded-lg shadow-md p-6 mb-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <h2 className="text-2xl font-bold mb-4" style={{ color:'#3d2e1f' }}>{editedRecipe.name}</h2>
                        <div className="mb-6">
                            <label className="block text-sm font-semibold mb-2" style={{ color:'#3d2e1f' }}>Recipe Source/Author (Optional)</label>
                            <input type="text" value={editedRecipe.source||''} onChange={e=>setEditedRecipe({...editedRecipe,source:e.target.value})} placeholder="e.g., Andy Cooks, MOB Kitchen, Em the Nutritionist" className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" />
                            <p className="text-xs mt-1" style={{ color:'#8b7355' }}>Add the author or website where you found this recipe</p>
                        </div>
                        <div className="grid grid-cols-2 gap-4 mb-6 text-sm">
                            <div><strong>Cuisine:</strong> {editedRecipe.cuisine}</div><div><strong>Type:</strong> {editedRecipe.dishType}</div>
                            <div><strong>Prep:</strong> {editedRecipe.prepTime} min</div><div><strong>Cook:</strong> {editedRecipe.cookTime} min</div>
                            <div><strong>Servings:</strong> {editedRecipe.servings}</div><div><strong>Cost:</strong> {editedRecipe.costRating}</div>
                        </div>
                        <div className="mb-6">
                            <h3 className="font-bold mb-2">Ingredients ({editedRecipe.ingredients?.length})</h3>
                            <ul className="space-y-1 text-sm">{editedRecipe.ingredients?.map((ing,i)=>(<li key={i}>{ing.amount} {ing.unit} {ing.item}</li>))}</ul>
                        </div>
                        <div className="mb-6">
                            <h3 className="font-bold mb-2">Steps ({editedRecipe.steps?.length})</h3>
                            <ol className="space-y-2 text-sm">{editedRecipe.steps?.map((step,i)=>(<li key={i} className="flex gap-2"><span className="font-bold">{i+1}.</span><span>{step.instruction}</span></li>))}</ol>
                        </div>
                        {editedRecipe.tags?.length>0&&<div className="mb-4"><strong>Tags:</strong> {editedRecipe.tags.join(', ')}</div>}
                    </div>
                    <div className="flex gap-3">
                        <button onClick={onReject} className="flex-1 bg-red-600 text-white py-3 rounded-lg font-semibold hover:bg-red-700 transition">✕ Reject</button>
                        <button onClick={()=>onApprove({...editedRecipe,image:selectedImage})} className="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">✓ Approve & Save</button>
                    </div>
                </div>
            );
        }

        // ─── SETTINGS VIEW ────────────────────────────────────────────────────────
        function SettingsView({ apiKey, onSaveApiKey, unsplashKey, onSaveUnsplashKey, onBack, recipes, processing, estimateAllRecipes, getMissingIngredientsReport, importNewRecipes, household, householdId, userRole, userId, userEmail, onHouseholdChange }) {
            const toast = useToast();
            const [key, setKey] = useState(apiKey);
            const [uKey, setUKey] = useState(unsplashKey);
            const [joinCode, setJoinCode] = useState('');
            const [householdLoading, setHouseholdLoading] = useState(false);
            const [householdMsg, setHouseholdMsg] = useState('');
            const [editorCode, setEditorCode] = useState(household?.inviteCodes?.editor||null);
            const [viewerCode, setViewerCode] = useState(household?.inviteCodes?.viewer||null);
            React.useEffect(()=>{ setEditorCode(household?.inviteCodes?.editor||null); setViewerCode(household?.inviteCodes?.viewer||null); },[household]);

            const handleSave = () => { localStorage.setItem('claudeApiKey', key); onSaveApiKey(key); localStorage.setItem('unsplashKey', uKey); onSaveUnsplashKey(uKey); toast('Settings saved','success'); };

            const [reclassifying, setReclassifying] = useState(false);
            const handleReclassify = async () => {
                if (!confirm(`Reclassify all ${recipes.length} recipes into the new folder structure? This will replace existing folders.`)) return;
                setReclassifying(true);
                const assign = (recipe) => {
                    const name = (recipe.name||'').toLowerCase();
                    const tags = (recipe.tags||[]).map(t=>t.toLowerCase());
                    const cuisine = (recipe.cuisine||'').toLowerCase();
                    const dishType = (recipe.dishType||'').toLowerCase();
                    const all = [name, ...tags, cuisine, dishType].join(' ');
                    const nameOnly = [name, cuisine, dishType].join(' ');
                    const folders = [];
                    if (/chicken|poultry|turkey/.test(all)) folders.push('Chicken');
                    if (/salmon|fish|tuna|cod|halibut|sea bass|sea bream|mackerel|anchovy|sardine|prawn|shrimp|seafood|crab|lobster|mussel|clam|squid|scallop/.test(all)) folders.push('Fish & Seafood');
                    if (/beef|lamb|pork|steak|mince|sausage|bacon|chorizo|veal|venison|duck|meat/.test(all)) folders.push('Meat');
                    if (/\bpasta\b|orzo|gnocchi|spaghetti|penne|tagliatelle|fettuccine|linguine|rigatoni|lasagne|lasagna/.test(all)) folders.push('Pasta');
                    if (/noodle|ramen|udon|soba|pad thai|lo mein|chow mein|vermicelli/.test(all)) folders.push('Noodles');
                    if (/\brice\b|risotto|quinoa|couscous|grain|pilaf|fried rice/.test(all)) folders.push('Rice & Grains');
                    if (/soup|stew|broth|chowder|bisque|curry|casserole|hotpot/.test(all)) folders.push('Soups & Stews');
                    if (/vegetarian|vegan|veggie|tofu|lentil|chickpea|bean|tempeh/.test(all)) folders.push('Vegetarian');
                    if (/\bsalad\b|slaw|panzanella|light meal/.test(all)) folders.push('Salads & Light Meals');
                    if (/traybake|tray bake|roast|baked|sheet pan/.test(all)) folders.push('Traybakes');
                    if (/japanese|sushi|bento|teriyaki|miso|ramen|udon|soba|tempura|tonkatsu/.test(all)) folders.push('Japanese');
                    if (/chinese|dim sum|dumpling|wonton|char siu|peking|szechuan|cantonese|stir.fry/.test(all)) folders.push('Chinese');
                    if (/indian|curry|tikka|masala|biryani|dal|dhal|tandoori|korma|vindaloo|naan|paneer/.test(all)) folders.push('Indian');
                    if (/asian|japanese|chinese|indian|thai|korean|vietnamese|sushi|bento|ramen|stir.fry|dim sum|dumpling|teriyaki|miso|pad thai|banh mi|kimchi|pho/.test(all)) folders.push('Asian');
                    if (/middle eastern|lebanese|moroccan|turkish|persian|israeli|hummus|falafel|shawarma|tagine|za.atar|tahini/.test(all)) folders.push('Middle Eastern');
                    if (/\bsauce\b|dressing|condiment|\bdip\b|marinade|vinaigrette|pesto|salsa|chutney|relish|\bjam\b|preserve/.test(nameOnly)) folders.push('Condiments & Sauces');
                    if (/\bjuice\b|\bdrink\b|smoothie|cocktail|mocktail|shake|lemonade|\btea\b|\bcoffee\b/.test(nameOnly)) folders.push('Juices & Drinks');
                    if (/breakfast|brunch|pancake|waffle|omelette|granola|porridge|muesli/.test(nameOnly)) folders.push('Breakfast');
                    if (folders.length === 0) folders.push('Vegetarian'); // fallback
                    return folders;
                };
                let count = 0;
                for (const recipe of recipes) {
                    const newFolders = assign(recipe);
                    await storage.updateRecipe(recipe.id, { folders: newFolders });
                    count++;
                }
                setReclassifying(false);
                toast(`✅ Reclassified ${count} recipes`, 'success');
            };
            const handleExport = () => {
                const dataStr = JSON.stringify(recipes, null, 2);
                const url = URL.createObjectURL(new Blob([dataStr], { type:'application/json' }));
                const link = document.createElement('a'); link.href=url; link.download=`recipes-backup-${new Date().toISOString().split('T')[0]}.json`; link.click(); URL.revokeObjectURL(url);
                toast(`Exported ${recipes.length} recipes`,'success');
            };
            const handleImport = (e) => {
                const file = e.target.files[0]; if(!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try { const imported = JSON.parse(event.target.result); if(!Array.isArray(imported)) throw new Error('Invalid file format'); let count=0; for(const recipe of imported){const{id,createdAt,updatedAt,createdBy,...data}=recipe;await storage.addRecipe(data);count++;} toast(`Imported ${count} recipes`,'success'); e.target.value=''; }
                    catch(err) { toast('Error importing recipes: '+err.message,'error'); }
                };
                reader.readAsText(file);
            };
            return (
                <div className="max-w-2xl mx-auto px-4 py-8">
                    <button onClick={onBack} className="mb-6 flex items-center hover:opacity-80 transition" style={{ color:'#d4a574' }}>← Back</button>
                    <h1 className="text-3xl font-bold mb-8" style={{ color:'#3d2e1f' }}>Settings</h1>
                    <div className="rounded-lg shadow-md p-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Claude API Key</h2>
                        <p className="mb-4 text-sm" style={{ color:'#8b7355' }}>Required for automatic recipe extraction. Get your key from <a href="https://console.anthropic.com" target="_blank" className="text-indigo-600 hover:underline">console.anthropic.com</a></p>
                        <div className="mb-4">
                            <label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>API Key</label>
                            <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" />
                        </div>
                        <div className="mb-4">
                            <label className="block text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Unsplash Access Key</label>
                            <input type="password" value={uKey} onChange={e=>setUKey(e.target.value)} placeholder="Your Unsplash Access Key..." className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" />
                            <p className="text-xs mt-1" style={{ color:'#8b7355' }}>Free key from <a href="https://unsplash.com/developers" target="_blank" className="underline">unsplash.com/developers</a> — enables "Find Image" on recipes</p>
                        </div>
                        <button onClick={handleSave} className="w-full text-white py-3 rounded-xl font-semibold hover:opacity-90 transition" style={{ background:'#d4a574' }}>Save Settings</button>
                        <div className="mt-6 p-4 bg-blue-50 rounded-lg"><p className="text-sm text-blue-800"><strong>Cost:</strong> ~$0.01–0.05 per recipe extraction</p></div>
                    </div>
                    <div className="rounded-lg shadow-md p-6 mt-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Backup & Restore</h2>
                        <div className="space-y-3">
                            <button onClick={handleExport} className="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">📥 Export All Recipes ({recipes.length})</button>
                            <label className="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition block text-center cursor-pointer">📤 Import Recipes from File<input type="file" accept=".json" onChange={handleImport} className="hidden" /></label>
                        </div>
                        <div className="mt-4 p-4 bg-yellow-50 rounded-lg border-l-4 border-yellow-400"><p className="text-sm text-yellow-800"><strong>⚠️ Important:</strong> Export your recipes regularly as a backup.</p></div>
                    </div>
                    <div className="rounded-lg shadow-md p-6 mt-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <h2 className="text-xl font-bold mb-2" style={{ color:'#3d2e1f' }}>Folder Reclassification</h2>
                        <p className="mb-4 text-sm" style={{ color:'#8b7355' }}>Reclassify all recipes into the new folder structure: Chicken, Fish & Seafood, Meat, Pasta & Grains, Soups & Stews, Vegetarian, Salads & Light Meals, Traybakes, Asian, Middle Eastern, Condiments & Sauces, Juices & Drinks, Breakfast, Base. This replaces all existing folders.</p>
                        <button onClick={handleReclassify} disabled={reclassifying} className="w-full text-white py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50" style={{ background:'#d4a574' }}>{reclassifying ? `⏳ Reclassifying...` : `📂 Reclassify All ${recipes.length} Recipes`}</button>
                    </div>
                    <div className="rounded-lg shadow-md p-6 mt-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Import Built-in Recipes</h2>
                        <p className="mb-4 text-sm" style={{ color:'#8b7355' }}>Add any recipes from the built-in library that aren't already in your collection. Safe to run multiple times — existing recipes are skipped.</p>
                        <button onClick={importNewRecipes} disabled={processing} className="w-full text-white py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50" style={{ background:'#d4a574' }}>{processing ? '⏳ Importing...' : `📥 Import New Recipes (${initialRecipes.length} in library, ${recipes.length} in your collection)`}</button>
                    </div>
                    <div className="rounded-lg shadow-md p-6 mt-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <h2 className="text-xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Nutrition Management</h2>
                        <p className="mb-4 text-sm" style={{ color:'#8b7355' }}>Automatically estimate nutrition for all recipes using the USDA database. Completely free — no API costs.</p>
                        <div className="space-y-3">
                            <button onClick={estimateAllRecipes} disabled={processing} className="w-full text-white py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50" style={{ background:'#d4a574' }}>{processing ? '⏳ Processing...' : `✨ Estimate All Recipes (${recipes.length})`}</button>
                            <button onClick={getMissingIngredientsReport} className="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition">📋 Export Missing Ingredients</button>
                        </div>
                        <div className="mt-4 p-4 bg-blue-50 rounded-lg">
                            <p className="text-sm text-blue-800 font-semibold mb-1">How it works:</p>
                            <ul className="text-sm text-blue-800 space-y-1 list-disc ml-4">
                                <li>Checks 500+ ingredient database first</li>
                                <li>Falls back to USDA API with smart search</li>
                                <li>Saves missing ingredients for reporting</li>
                                <li>Skips recipes that already have nutrition</li>
                            </ul>
                        </div>
                    </div>
                    {/* Household */}
                    <div className="rounded-lg shadow-md p-6 mt-6" style={{ background:'#fffef9', border:'2px solid #e8dfd3' }}>
                        <h2 className="text-xl font-bold mb-1" style={{ color:'#3d2e1f' }}>Household</h2>
                        <p className="text-sm mb-4" style={{ color:'#8b7355' }}>Share your shopping list and meal plan with your household.</p>
                        {householdMsg && <div className="mb-4 p-3 rounded-lg text-sm" style={{ background:'#f5ede1', color:'#6d5738' }}>{householdMsg}</div>}
                        {!householdId ? (
                            <div className="space-y-4">
                                <div>
                                    <p className="text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>You're not in a household yet.</p>
                                    <button onClick={async()=>{ setHouseholdLoading(true); try{ const h=await storage.createHousehold(userId,userEmail); setEditorCode(h.inviteCodes.editor); setViewerCode(h.inviteCodes.viewer); await onHouseholdChange(); setHouseholdMsg('✅ Household created!'); }catch(e){setHouseholdMsg('❌ '+e.message);} setHouseholdLoading(false); }} disabled={householdLoading} className="w-full text-white py-3 rounded-lg font-semibold hover:opacity-90 transition disabled:opacity-50" style={{ background:'#d4a574' }}>
                                        {householdLoading ? '⏳ Creating...' : '🏠 Create a Household'}
                                    </button>
                                </div>
                                <div className="pt-3" style={{ borderTop:'1px solid #e8dfd3' }}>
                                    <p className="text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Have an invite code?</p>
                                    <div className="flex gap-2">
                                        <input type="text" value={joinCode} onChange={e=>setJoinCode(e.target.value)} placeholder="e.g. E-ABC123XY" className="flex-1 px-3 py-2 rounded-lg text-sm" style={{ border:'2px solid #e8dfd3', background:'#faf8f5' }} />
                                        <button onClick={async()=>{ if(!joinCode.trim())return; setHouseholdLoading(true); try{ await storage.joinHousehold(userId,userEmail,joinCode.trim()); await onHouseholdChange(); setHouseholdMsg('✅ Joined household!'); setJoinCode(''); }catch(e){setHouseholdMsg('❌ '+e.message);} setHouseholdLoading(false); }} disabled={householdLoading||!joinCode.trim()} className="text-white px-4 py-2 rounded-lg text-sm font-semibold hover:opacity-90 transition disabled:opacity-50" style={{ background:'#97c459' }}>
                                            {householdLoading ? '⏳' : 'Join'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div className="p-3 rounded-lg" style={{ background:'#f5ede1' }}>
                                    <p className="text-xs font-medium uppercase tracking-wide mb-1" style={{ color:'#8b7355' }}>Your role</p>
                                    <p className="font-semibold capitalize" style={{ color:'#3d2e1f' }}>{userRole} {userRole==='owner'?'👑':userRole==='editor'?'✏️':'👀'}</p>
                                </div>
                                <div>
                                    <p className="text-sm font-medium mb-2" style={{ color:'#3d2e1f' }}>Members</p>
                                    <div className="space-y-2">
                                        {household?.members?.map(m => (
                                            <div key={m.userId} className="flex items-center justify-between p-2 rounded-lg" style={{ background:'#faf8f5', border:'1px solid #e8dfd3' }}>
                                                <div>
                                                    <span className="text-sm font-medium" style={{ color:'#3d2e1f' }}>{m.email}</span>
                                                    <span className="ml-2 text-xs capitalize" style={{ color:'#8b7355' }}>{m.role}</span>
                                                </div>
                                                {userRole==='owner' && m.userId!==userId && (
                                                    <button onClick={async()=>{ if(!confirm(`Remove ${m.email}?`))return; setHouseholdLoading(true); try{ await storage.removeMember(householdId,m.userId); await onHouseholdChange(); setHouseholdMsg(`Removed ${m.email}.`); }catch(e){setHouseholdMsg('❌ '+e.message);} setHouseholdLoading(false); }} className="text-xs text-red-500 hover:text-red-700">Remove</button>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {userRole==='owner' && (
                                    <div className="space-y-3 pt-3" style={{ borderTop:'1px solid #e8dfd3' }}>
                                        <p className="text-sm font-medium" style={{ color:'#3d2e1f' }}>Invite codes <span className="text-xs font-normal" style={{ color:'#8b7355' }}>(one use each)</span></p>
                                        <div className="p-3 rounded-lg" style={{ background:'#faf8f5', border:'1px solid #e8dfd3' }}>
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <p className="text-xs font-medium" style={{ color:'#8b7355' }}>✏️ Editor (full access)</p>
                                                    <p className="font-mono text-sm font-bold mt-0.5" style={{ color:'#3d2e1f' }}>{editorCode || <span className="text-gray-400 font-normal text-xs">Used — regenerate to get a new one</span>}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    {editorCode && <button onClick={()=>navigator.clipboard.writeText(editorCode).then(()=>setHouseholdMsg('Copied editor code!'))} className="text-xs px-2 py-1 rounded" style={{ background:'#d4a574', color:'white' }}>Copy</button>}
                                                    <button onClick={async()=>{ setHouseholdLoading(true); try{ const c=await storage.regenerateInviteCode(householdId,'editor'); setEditorCode(c); setHouseholdMsg('New editor code generated.'); }catch(e){setHouseholdMsg('❌ '+e.message);} setHouseholdLoading(false); }} className="text-xs px-2 py-1 rounded" style={{ background:'#f5ede1', color:'#6d5738' }}>New</button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-3 rounded-lg" style={{ background:'#faf8f5', border:'1px solid #e8dfd3' }}>
                                            <div className="flex items-center justify-between">
                                                <div>
                                                    <p className="text-xs font-medium" style={{ color:'#8b7355' }}>👀 Viewer (read only)</p>
                                                    <p className="font-mono text-sm font-bold mt-0.5" style={{ color:'#3d2e1f' }}>{viewerCode || <span className="text-gray-400 font-normal text-xs">Used — regenerate to get a new one</span>}</p>
                                                </div>
                                                <div className="flex gap-2">
                                                    {viewerCode && <button onClick={()=>navigator.clipboard.writeText(viewerCode).then(()=>setHouseholdMsg('Copied viewer code!'))} className="text-xs px-2 py-1 rounded" style={{ background:'#d4a574', color:'white' }}>Copy</button>}

            // Compress image to max 800px wide and ~100KB before storing in Firestore
            const compressImage = (dataUrl) => new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 800, maxH = 600;
                    let w = img.width, h = img.height;
                    if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                    if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);

            const [currentFolder, setCurrentFolder] = useState('');

            const addStep = () => setSteps([...steps,{instruction:'',duration:0}]);
            const removeStep = (i) => setSteps(steps.filter((_,idx)=>idx!==i));
            const updateStep = (i,field,value) => { const u=[...steps]; u[i][field]=value; setSteps(u); };
            const addTag = () => { if(currentTag.trim()&&!recipe.tags.includes(currentTag.trim())){setRecipe({...recipe,tags:[...recipe.tags,currentTag.trim()]});setCurrentTag('');} };

            return (
                <div className="max-w-4xl mx-auto px-4 py-8">
