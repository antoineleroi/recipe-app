                    <div className="rounded-xl shadow-lg overflow-hidden" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <div className="relative">
                            {recipe.image ? <div className="h-64 bg-cover" style={{ backgroundImage:`url(${recipe.image})`, backgroundPosition:recipe.imagePosition||'50% 50%' }} /> : <div className="h-64 flex items-center justify-center" style={{ background:'linear-gradient(135deg, #d4a574 0%, #c4915f 100%)' }}><span className="text-white text-9xl">🍽️</span></div>}
                        </div>
                        <div className="p-8">
                            <h1 className="text-4xl font-semibold mb-2" style={{ color:'#3d2e1f' }}>{recipe.name}</h1>
                            {recipe.source&&<div className="mb-4 text-sm" style={{ color:'#8b7355' }}><span className="font-semibold">Recipe by:</span> {recipe.source}</div>}
                            <div className="flex flex-wrap gap-3 mb-4">
                                {recipe.cuisine&&<span className="px-3 py-1 rounded-full text-sm" style={{ background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3' }}>{recipe.cuisine}</span>}
                                {recipe.dishType&&<span className="px-3 py-1 rounded-full text-sm" style={{ background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3' }}>{recipe.dishType}</span>}
                                {recipe.cookingMethod&&<span className="px-3 py-1 rounded-full text-sm" style={{ background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3' }}>{recipe.cookingMethod}</span>}
                            </div>
                            {recipe.tags?.length>0&&<div className="flex flex-wrap gap-2 mb-4">{recipe.tags.map((tag,idx)=>(<span key={idx} className="px-3 py-1 rounded-full text-sm" style={{ background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3' }}>#{tag}</span>))}</div>}
                            {recipe.folders?.length>0&&<div className="mb-6 text-sm" style={{ color:'#8b7355' }}><span className="font-semibold">📁 Folders: </span>{recipe.folders.join(' • ')}</div>}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 p-4 rounded-lg" style={{ background:'#faf8f5' }}>
                                <div><div className="text-sm" style={{ color:'#8b7355' }}>Prep Time</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.prepTime} min</div></div>
                                <div><div className="text-sm" style={{ color:'#8b7355' }}>Cook Time</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.cookTime} min</div></div>
                                <div><div className="text-sm" style={{ color:'#8b7355' }}>Servings</div><div className="flex items-center gap-2 mt-1"><button onClick={()=>setScaledServings(Math.max(1,scaledServings-1))} className="w-8 h-8 text-white rounded-full hover:opacity-90 transition font-bold" style={{ background:'#d4a574' }}>-</button><span className="text-xl font-semibold w-8 text-center" style={{ color:'#3d2e1f' }}>{scaledServings}</span><button onClick={()=>setScaledServings(scaledServings+1)} className="w-8 h-8 text-white rounded-full hover:opacity-90 transition font-bold" style={{ background:'#d4a574' }}>+</button></div></div>
                                <div><div className="text-sm" style={{ color:'#8b7355' }}>Per Serving</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.nutrition?.calories?`${recipe.nutrition.calories} cal`:'N/A'}</div></div>
                            </div>
                            {scaledServings!==recipe.servings&&<div className="mb-6 p-3 rounded-lg text-sm" style={{ background:'#f5ede1',borderLeft:'4px solid #d4a574',color:'#6d5738' }}><strong>Scaled:</strong> Recipe adjusted from {recipe.servings} to {scaledServings} servings (×{scaleFactor.toFixed(2)})</div>}
                            <div className="mb-8">
                                <h2 className="text-2xl font-semibold mb-4" style={{ color:'#3d2e1f' }}>Ingredients</h2>
                                <ul className="space-y-2">{[...(recipe.ingredients||[])].sort((a,b)=>a.item.localeCompare(b.item)).map((ing,idx)=>(<li key={idx} className="flex items-center"><span className="w-2 h-2 rounded-full mr-3" style={{ background:'#d4a574' }}></span><span className="font-medium">{ing.amount>0?scaleAmount(ing.amount):''} {ing.unit}</span><span className="ml-2">{ing.item}</span></li>))}</ul>
                            </div>
                            <div className="mb-8">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-2xl font-semibold" style={{ color:'#3d2e1f' }}>Nutrition</h2>
                                    <button onClick={async()=>{const n=await estimateNutrition(recipe);if(n){await storage.updateRecipe(recipe.id,{nutrition:n});setSelectedRecipe({...recipe,nutrition:n});}}} className="text-sm px-4 py-2 rounded-lg hover:opacity-90 transition no-print" style={{ background:'#f5ede1',color:'#6d5738',border:'1px solid #e8dfd3' }}>{recipe.nutrition?.calories?'🔄 Recalculate':'✨ Estimate'}</button>
                                </div>
                                {recipe.nutrition?.calories ? (
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 p-4 rounded-lg" style={{ background:'#faf8f5' }}>
                                        <div><div className="text-sm" style={{ color:'#8b7355' }}>Calories</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.nutrition.calories} kcal</div></div>
                                        <div><div className="text-sm" style={{ color:'#8b7355' }}>Protein</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.nutrition.protein||0}g</div></div>
                                        <div><div className="text-sm" style={{ color:'#8b7355' }}>Carbs</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.nutrition.carbs||0}g</div></div>
                                        <div><div className="text-sm" style={{ color:'#8b7355' }}>Fat</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.nutrition.fat||0}g</div></div>
                                        <div><div className="text-sm" style={{ color:'#8b7355' }}>Fiber</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.nutrition.fiber||0}g</div></div>
                                        <div><div className="text-sm" style={{ color:'#8b7355' }}>Sugar</div><div className="text-xl font-semibold" style={{ color:'#3d2e1f' }}>{recipe.nutrition.sugar||0}g</div></div>
                                    </div>
                                ) : (
                                    <div className="p-6 rounded-lg text-center" style={{ background:'#faf8f5' }}><p className="text-sm" style={{ color:'#8b7355' }}>No nutrition data yet. Click "Estimate" to calculate.</p></div>
                                )}
                                {recipe.nutrition?.calories&&<p className="text-xs mt-2" style={{ color:'#8b7355' }}>* Per serving estimate. Actual values may vary.</p>}
                            </div>
                            <div className="mb-8">
                                <h2 className="text-2xl font-bold mb-4" style={{ color:'#3d2e1f' }}>Instructions</h2>
                                <ol className="space-y-4">{recipe.steps?.map(step=>(<li key={step.step} className="flex"><span className="flex-shrink-0 w-8 h-8 text-white rounded-full flex items-center justify-center font-bold mr-4" style={{ background:'#d4a574' }}>{step.step}</span><div className="flex-1"><p style={{ color:'#3d2e1f' }}>{step.instruction}</p>{step.duration>0&&<p className="text-sm mt-1" style={{ color:'#8b7355' }}>⏱️ {step.duration} minutes</p>}</div></li>))}</ol>
                            </div>
                            {recipe.notes&&<div className="p-4 mb-6 rounded-lg" style={{ background:'#f5ede1',borderLeft:'4px solid #FAC775',color:'#6d5738' }}><h3 className="font-semibold mb-2">Notes</h3><p>{recipe.notes}</p></div>}
                            <div className="space-y-3">
                                <button onClick={()=>onAddToShoppingList(scaledServings)} className="w-full text-white py-4 rounded-xl font-semibold text-lg hover:opacity-90 transition no-print" style={{ background:'#97c459' }}>🛒 Add to Shopping List ({scaledServings} servings)</button>
                                <button onClick={onAddToMealPlan} className="w-full text-white py-4 rounded-xl font-semibold text-lg hover:opacity-90 transition no-print" style={{ background:'#FAC775' }}>📅 Add to Meal Plan</button>
                                <button onClick={onStartCooking} className="w-full text-white py-4 rounded-xl font-semibold text-lg hover:opacity-90 transition no-print" style={{ background:'linear-gradient(135deg, #d4a574 0%, #c4915f 100%)' }}>🧑‍🍳 Start Cooking Mode</button>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={onEdit} className="text-white py-3 rounded-xl font-semibold hover:opacity-90 transition no-print" style={{ background:'#FAC775' }}>✏️ Edit Recipe</button>
                                    <button onClick={onDelete} className="text-white py-3 rounded-xl font-semibold hover:opacity-90 transition no-print" style={{ background:'#f5576c' }}>🗑️ Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── COOKING MODE ─────────────────────────────────────────────────────────
        function CookingModeView({ recipe, onExit, completedSteps, setCompletedSteps, scaledServings }) {
            const scaleFactor = (scaledServings || recipe.servings) / recipe.servings;
            const scaleAmount = (amount) => { const s=amount*scaleFactor; return s%1===0?s:Math.round(s*100)/100; };
            const toggleStep = (stepNumber) => setCompletedSteps(completedSteps.includes(stepNumber)?completedSteps.filter(s=>s!==stepNumber):[...completedSteps,stepNumber]);
            const allDone = recipe.steps?.length === completedSteps.length;
            return (
                <div className="min-h-screen" style={{ background:'#faf8f5' }}>
                    <div className="max-w-7xl mx-auto px-4 py-6">
                        <div className="rounded-lg shadow-sm p-4 mb-6 flex justify-between items-center no-print" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                            <button onClick={onExit} className="flex items-center hover:opacity-80" style={{ color:'#8b7355' }}>← Exit Cooking Mode</button>
                            <div className="text-right"><div className="text-sm" style={{ color:'#8b7355' }}>Progress</div><div className="text-lg font-bold" style={{ color:'#d4a574' }}>{completedSteps.length} / {recipe.steps?.length||0}</div></div>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1">
                                <div className="sticky-ingredients rounded-lg shadow-md p-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                                    <h2 className="text-2xl font-bold mb-4" style={{ color:'#3d2e1f' }}>🥘 {recipe.name}</h2>
                                    <div className="mb-4 p-3 rounded-lg" style={{ background:'#faf8f5' }}><div className="text-sm" style={{ color:'#8b7355' }}>Servings</div><div className="text-xl font-bold" style={{ color:'#3d2e1f' }}>{scaledServings}</div>{scaledServings!==recipe.servings&&<div className="text-xs mt-1" style={{ color:'#d4a574' }}>Scaled from {recipe.servings} (×{scaleFactor.toFixed(2)})</div>}</div>
                                    <h3 className="text-lg font-bold mb-3" style={{ color:'#3d2e1f' }}>Ingredients</h3>
                                    <ul className="space-y-2">{[...(recipe.ingredients||[])].sort((a,b)=>a.item.localeCompare(b.item)).map((ing,idx)=>(<li key={idx} className="flex items-start"><span className="w-2 h-2 rounded-full mr-3 mt-2" style={{ background:'#d4a574' }}></span><div><span className="font-medium">{ing.amount>0?scaleAmount(ing.amount):''} {ing.unit}</span><span className="ml-2">{ing.item}</span></div></li>))}</ul>
                                    {allDone&&<div className="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg"><div className="text-green-800 font-bold mb-2">✓ All Steps Complete!</div><button onClick={onExit} className="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-semibold transition">Finish & Exit</button></div>}
                                </div>
                            </div>
                            <div className="lg:col-span-2 space-y-4">
                                <div className="rounded-lg shadow-md p-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                                    <h3 className="text-2xl font-bold mb-6" style={{ color:'#3d2e1f' }}>Instructions</h3>
                                    <div className="space-y-4">{recipe.steps?.map(step=>{const done=completedSteps.includes(step.step); return (<div key={step.step} className={`border rounded-lg p-4 transition-all ${done?'bg-gray-50 border-gray-200':'border-indigo-200 shadow-sm'}`} style={done?{}:{background:'#fffef9'}}><div className="flex items-start"><button onClick={()=>toggleStep(step.step)} className="flex-shrink-0 mr-4 mt-1"><div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold transition text-white`} style={{ background:done?'#97c459':'#d4a574' }}>{done?'✓':step.step}</div></button><div className="flex-1"><p className={`text-lg ${done?'step-completed text-gray-500':''}`} style={done?{}:{color:'#3d2e1f'}}>{step.instruction}</p>{step.duration>0&&<div className={`mt-2 inline-flex items-center px-3 py-1 rounded-full text-sm ${done?'bg-gray-200 text-gray-500':'bg-orange-100 text-orange-700'}`}><span className="mr-1">⏱️</span>{step.duration} minutes</div>}</div></div></div>);})}</div>
                                </div>
                                {recipe.notes&&<div className="p-4 rounded-lg" style={{ background:'#f5ede1',borderLeft:'4px solid #FAC775',color:'#6d5738' }}><h4 className="font-bold mb-2">📝 Chef's Notes</h4><p>{recipe.notes}</p></div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── MEAL PLANNER ─────────────────────────────────────────────────────────
        function MealPlannerView({ mealPlan, recipes, onBack, onAddRecipe, onRemoveRecipe, onUpdateNotes, onClearPlan, onAddToShoppingList, mealPlanPeople, setMealPlanPeople, preselectedRecipe }) {
            const [showDistributionModal, setShowDistributionModal] = useState(!!preselectedRecipe);
            const [selectedRecipe, setSelectedRecipe] = useState(preselectedRecipe || null);
            const [selectedSlots, setSelectedSlots] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [showManualEntry, setShowManualEntry] = useState(false);
            const [manualEntrySlot, setManualEntrySlot] = useState(null);
            const [manualText, setManualText] = useState('');
            const daysOfWeek = [{key:'monday',label:'Mon'},{key:'tuesday',label:'Tue'},{key:'wednesday',label:'Wed'},{key:'thursday',label:'Thu'},{key:'friday',label:'Fri'},{key:'saturday',label:'Sat'},{key:'sunday',label:'Sun'}];
            const mealTypes = [{key:'breakfast',label:'B',full:'Breakfast'},{key:'lunch',label:'L',full:'Lunch'},{key:'dinner',label:'D',full:'Dinner'}];
            const filteredRecipes = recipes.filter(r=>r.name.toLowerCase().includes(searchQuery.trim().toLowerCase()));
            const toggleSlot = (dayKey,mealType) => { const e=selectedSlots.find(s=>s.dayKey===dayKey&&s.mealType===mealType); if(e)setSelectedSlots(selectedSlots.filter(s=>!(s.dayKey===dayKey&&s.mealType===mealType))); else setSelectedSlots([...selectedSlots,{dayKey,mealType,portions:mealPlanPeople}]); };
            const updateSlotPortions = (dayKey,mealType,portions) => setSelectedSlots(selectedSlots.map(s=>s.dayKey===dayKey&&s.mealType===mealType?{...s,portions}:s));
            const handleDistribute = async () => {
                if (!selectedRecipe || selectedSlots.length === 0) return;
                for (const slot of selectedSlots) {
                    await onAddRecipe(slot.dayKey, slot.mealType, selectedRecipe.id, slot.portions);
                }
                setShowDistributionModal(false);setSelectedRecipe(null);setSelectedSlots([]);setSearchQuery('');
            };
            const handleManualEntry = () => { if(!manualEntrySlot||!manualText.trim()) return; onAddRecipe(manualEntrySlot.dayKey,manualEntrySlot.mealType,'manual',0,manualText.trim()); setShowManualEntry(false);setManualEntrySlot(null);setManualText(''); };
            const getSlotStatus = (dayKey,mealType) => { const meals=mealPlan.days?.[dayKey]?.[mealType]||[]; if(meals.some(m=>m.recipeId==='manual'))return{type:'manual',text:meals[0].manualText}; return{type:'recipe',portions:meals.reduce((s,m)=>s+(m.servings||0),0),count:meals.length}; };
            const totalMeals = Object.keys(mealPlan.days||{}).reduce((count,dayKey)=>{ const d=mealPlan.days[dayKey]; return count+(d.lunch?.length||0)+(d.dinner?.length||0); },0);
            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    <button onClick={onBack} className="mb-6 flex items-center hover:opacity-80 transition no-print" style={{ color:'#d4a574' }}>← Back to Recipes</button>
                    <div className="rounded-lg shadow-lg p-6" style={{ background:'#fffef9',border:'2px solid #e8dfd3' }}>
                        <div className="flex justify-between items-center mb-6 flex-wrap gap-4">
                            <div><h1 className="text-3xl font-bold" style={{ color:'#3d2e1f' }}>Meal Planner</h1><p className="mt-1" style={{ color:'#8b7355' }}>{totalMeals} meal{totalMeals!==1?'s':''} planned</p></div>
                            <div className="flex gap-2 items-center flex-wrap">
                                <div className="flex items-center gap-2 px-3 py-2 rounded-lg" style={{ background:'#f5ede1',border:'1px solid #e8dfd3' }}><span className="text-sm font-semibold" style={{ color:'#3d2e1f' }}>People:</span><select value={mealPlanPeople} onChange={e=>setMealPlanPeople(parseInt(e.target.value))} className="border border-gray-300 rounded px-2 py-1 text-sm">{[1,2,3,4,5,6,7,8].map(n=>(<option key={n} value={n}>{n}</option>))}</select></div>
                                <button onClick={()=>setShowDistributionModal(true)} className="text-white px-4 py-2 rounded-lg font-semibold hover:opacity-90 transition text-sm" style={{ background:'#d4a574' }}>+ Recipe</button>
                                <button onClick={onAddToShoppingList} className="text-white px-4 py-2 rounded-lg font-semibold hover:opacity-90 transition text-sm" style={{ background:'#97c459' }} disabled={totalMeals===0}>🛒</button>
                                <button onClick={onClearPlan} className="bg-red-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-700 transition text-sm">Clear</button>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full border-collapse text-sm">
                                <thead><tr><th className="border border-gray-300 bg-gray-50 p-2 font-bold"></th>{daysOfWeek.map(day=>(<th key={day.key} className="border border-gray-300 bg-gray-50 p-2 font-bold">{day.label}</th>))}</tr></thead>
                                <tbody>{mealTypes.map(meal=>(<tr key={meal.key}><td className="border border-gray-300 p-2 font-semibold" style={{ background:'#f5ede1',color:'#3d2e1f' }}>{meal.full}</td>{daysOfWeek.map(day=>{ const meals=mealPlan.days?.[day.key]?.[meal.key]||[]; const hasContent=meals.length>0; const bgColor=hasContent ? (meals.some(m=>m.recipeId==='manual')?'#f5ede1':'#EAF3DE') : 'white'; return (<td key={day.key} className="border border-gray-300 p-2 align-top transition" style={{ background:bgColor }}>{hasContent?(<div className="space-y-1">{meals.map((m,idx)=>{ if(m.recipeId==='manual')return(<div key={idx} className="flex items-center justify-between text-xs"><span className="italic">📝 {m.manualText}</span><button onClick={e=>{e.stopPropagation();onRemoveRecipe(day.key,meal.key,idx);}} className="text-red-600 hover:text-red-800">✕</button></div>); const r=recipes.find(x=>x.id===m.recipeId); if(!r)return null; return(<div key={idx} className="flex items-center justify-between text-xs"><div className="flex-1 min-w-0"><div className="font-medium truncate" style={{ color:'#3d2e1f' }}>{r.name}</div><div style={{ color:'#8b7355' }}>{m.servings}p</div></div><button onClick={e=>{e.stopPropagation();onRemoveRecipe(day.key,meal.key,idx);}} className="text-red-600 hover:text-red-800 ml-1">✕</button></div>); })}<button onClick={()=>{setManualEntrySlot({dayKey:day.key,mealType:meal.key});setShowManualEntry(true);}} className="text-xs mt-1 hover:opacity-80" style={{ color:'#8b7355' }}>+ note</button></div>):(<div className="text-xs text-center cursor-pointer hover:opacity-80" style={{ color:'#c4b8a8' }} onClick={()=>{setManualEntrySlot({dayKey:day.key,mealType:meal.key});setShowManualEntry(true);}}>—</div>)}</td>); })}</tr>))}</tbody>
                            </table>
                        </div>
                        <div className="mt-4 flex gap-4 text-xs flex-wrap" style={{ color:'#8b7355' }}>
                            <div className="flex items-center gap-1"><div className="w-4 h-4 rounded" style={{ background:'white',border:'1px solid #e8dfd3' }}></div>Empty</div>
                            <div className="flex items-center gap-1"><div className="w-4 h-4 rounded" style={{ background:'#EAF3DE',border:'1px solid #97C459' }}></div>Planned</div>
                            <div className="flex items-center gap-1"><div className="w-4 h-4 rounded" style={{ background:'#f5ede1',border:'1px solid #e8dfd3' }}></div>Manual</div>
                        </div>
                    </div>
                    {showDistributionModal&&(<>
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-40" onClick={()=>setShowDistributionModal(false)} />
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="rounded-2xl shadow-2xl w-full my-8" style={{ maxWidth:'480px', background:'#fffef9', border:'1px solid #e8dfd3' }}>
                                {/* Header */}
                                <div className="px-5 py-4" style={{ borderBottom:'1px solid #e8dfd3' }}>
                                    <h2 className="text-base font-medium mb-3" style={{ color:'#3d2e1f' }}>Add to meal plan</h2>
                                    <input type="text" value={searchQuery} onChange={e=>{setSearchQuery(e.target.value);setSelectedRecipe(null);}} placeholder="Search recipes..." className="w-full px-3 py-2 rounded-lg text-sm" style={{ border:'1.5px solid #e8dfd3', background:'#faf8f5', color:'#3d2e1f' }} autoFocus />
                                    {searchQuery && !selectedRecipe && (
                                        <div className="mt-2 rounded-lg overflow-hidden" style={{ border:'1px solid #e8dfd3', maxHeight:'160px', overflowY:'auto' }}>
                                            {filteredRecipes.slice(0,8).map(r=>(
                                                <button key={r.id} onClick={()=>{setSelectedRecipe(r);setSearchQuery(r.name);}} className="w-full text-left px-3 py-2 text-sm hover:opacity-80 transition" style={{ background:'#faf8f5', color:'#3d2e1f', borderBottom:'1px solid #f5ede1' }}>{r.name}</button>
                                            ))}
                                        </div>
                                    )}
                                    {selectedRecipe && (
                                        <div className="mt-2 flex items-center gap-2 px-3 py-2 rounded-lg text-sm" style={{ background:'#f5ede1', color:'#6d5738' }}>
                                            <span style={{ fontSize:'14px' }}>🍽️</span>
                                            <span className="font-medium flex-1 truncate">{selectedRecipe.name}</span>
                                            <button onClick={()=>{setSelectedRecipe(null);setSearchQuery('');}} style={{ color:'#d4a574', fontSize:'16px' }}>✕</button>
                                        </div>
                                    )}
                                </div>

                                {/* Slot grid */}
                                {selectedRecipe && (
                                    <div className="px-5 py-4" style={{ maxHeight:'50vh', overflowY:'auto' }}>
                                        <p className="text-xs font-medium uppercase tracking-wide mb-3" style={{ color:'#8b7355', letterSpacing:'0.06em' }}>Select slots</p>
                                        {daysOfWeek.map(day => (
                                            <div key={day.key} className="flex items-center gap-2 mb-2">
                                                <div className="text-xs font-medium w-7 flex-shrink-0" style={{ color:'#8b7355' }}>{day.label}</div>
                                                {mealTypes.map(meal => {
                                                    const isSel = selectedSlots.some(s=>s.dayKey===day.key&&s.mealType===meal.key);
                                                    const selSlot = selectedSlots.find(s=>s.dayKey===day.key&&s.mealType===meal.key);
                                                    const existingMeals = mealPlan.days?.[day.key]?.[meal.key]||[];
                                                    const totalPortions = existingMeals.reduce((s,m)=>s+(m.servings||0),0);
                                                    const existingRecipe = existingMeals.length>0 && existingMeals[0].recipeId!=='manual' ? recipes.find(r=>r.id===existingMeals[0].recipeId) : null;
                                                    const isManual = existingMeals.some(m=>m.recipeId==='manual');
                                                    const isEmpty = existingMeals.length===0;
                                                    const isOccupied = !isEmpty && !isManual;

                                                    let bg, border, nameColor, portionColor, dotColor;
                                                    if (isSel) {
                                                        bg='#3B6D11'; border='#27500A'; nameColor='#EAF3DE'; portionColor='#C0DD97'; dotColor='#C0DD97';
                                                    } else if (isManual) {
                                                        bg='#f5ede1'; border='#e8dfd3'; nameColor='#6d5738'; portionColor='#8b7355'; dotColor='#d4a574';
                                                    } else if (isOccupied) {
                                                        bg='#EAF3DE'; border='#97C459'; nameColor='#3B6D11'; portionColor='#3B6D11'; dotColor='#639922';
                                                    } else {
                                                        bg='#faf8f5'; border='#e8dfd3'; nameColor='#8b7355'; portionColor='#8b7355'; dotColor='#d4d4d4';
                                                    }

                                                    const displayName = isSel ? 'Selected' : isManual ? 'Manual' : existingRecipe ? existingRecipe.name : 'Free';
                                                    const displayPortions = isSel ? `${selSlot.portions} portions` : (isOccupied) ? `${totalPortions}p` : null;

                                                    return (
                                                        <button key={meal.key} onClick={()=>toggleSlot(day.key,meal.key)} className="flex-1 rounded-lg px-2 py-1.5 text-left transition hover:opacity-80" style={{ border:`1.5px solid ${border}`, background:bg, minWidth:0 }}>
                                                            <div className="flex items-center justify-between mb-0.5">
                                                                <span className="text-xs font-medium" style={{ color: isSel?'#C0DD97': nameColor, fontSize:'9px', textTransform:'uppercase', letterSpacing:'0.04em' }}>{meal.full}</span>
                                                                <span style={{ width:'6px', height:'6px', borderRadius:'50%', background:dotColor, display:'inline-block', flexShrink:0 }}></span>
                                                            </div>
                                                            <div className="text-xs truncate font-medium" style={{ color:nameColor, fontSize:'10px' }}>{displayName}</div>
                                                            {displayPortions && <div className="text-xs" style={{ color:portionColor, fontSize:'9px' }}>{displayPortions}</div>}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        ))}
                                        <div className="flex gap-4 mt-3 pt-3" style={{ borderTop:'1px solid #e8dfd3' }}>
                                            <div className="flex items-center gap-1.5 text-xs" style={{ color:'#8b7355' }}><span style={{ width:'8px',height:'8px',borderRadius:'50%',background:'#d4d4d4',display:'inline-block' }}></span>Free</div>
                                            <div className="flex items-center gap-1.5 text-xs" style={{ color:'#8b7355' }}><span style={{ width:'8px',height:'8px',borderRadius:'50%',background:'#639922',display:'inline-block' }}></span>Occupied</div>
                                            <div className="flex items-center gap-1.5 text-xs" style={{ color:'#8b7355' }}><span style={{ width:'8px',height:'8px',borderRadius:'50%',background:'#3B6D11',display:'inline-block' }}></span>Selected</div>
                                        </div>
                                    </div>
                                )}

                                {/* Portions selector for selected slots */}
                                {selectedSlots.length > 0 && (
                                    <div className="px-5 pb-4">
                                        <p className="text-xs font-medium uppercase tracking-wide mb-2" style={{ color:'#8b7355', letterSpacing:'0.06em' }}>Portions per slot</p>
                                        <div className="flex flex-wrap gap-2">
                                            {selectedSlots.map(slot => (
                                                <div key={`${slot.dayKey}-${slot.mealType}`} className="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs" style={{ background:'#f5ede1', border:'1px solid #e8dfd3', color:'#6d5738' }}>
                                                    <span className="font-medium">{slot.dayKey.slice(0,3)} {slot.mealType.slice(0,1).toUpperCase()}</span>
                                                    <select value={slot.portions} onChange={e=>updateSlotPortions(slot.dayKey,slot.mealType,parseInt(e.target.value))} className="border-0 bg-transparent text-xs font-medium" style={{ color:'#6d5738' }}>
                                                        {[1,2,3,4,5,6,7,8].map(n=>(<option key={n} value={n}>{n}p</option>))}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Footer */}
                                <div className="px-5 py-4 flex items-center justify-between" style={{ borderTop:'1px solid #e8dfd3' }}>
                                    <span className="text-sm" style={{ color:'#8b7355' }}>{selectedSlots.length} slot{selectedSlots.length!==1?'s':''} selected</span>
                                    <div className="flex gap-2">
                                        <button onClick={()=>{setShowDistributionModal(false);setSelectedRecipe(null);setSelectedSlots([]);setSearchQuery('');}} className="px-4 py-2 rounded-lg text-sm font-medium" style={{ background:'#f5ede1', color:'#6d5738', border:'1px solid #e8dfd3' }}>Cancel</button>
                                        <button onClick={handleDistribute} disabled={!selectedRecipe||selectedSlots.length===0} className="px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition disabled:opacity-40" style={{ background:'#3B6D11', color:'#EAF3DE', border:'none' }}>Save to plan</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </>)}
                    {showManualEntry&&(<>
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-40" onClick={()=>setShowManualEntry(false)} />
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">

        // ─── SHOPPING LIST ────────────────────────────────────────────────────────
        function ShoppingListView({ shoppingList, onBack, onToggleItem, onAddManualItem, onRemoveItem, onEditItem, onRemoveRecipe, onClearList }) {
            const [showAddItem, setShowAddItem] = useState(false);
            const [newItem, setNewItem] = useState({ item:'',amount:'',unit:'',category:'fresh' });

            const handleEditSave = async (id, isManual) => { if(editingItem){await onEditItem(id,isManual,editingItem.amount,editingItem.unit);setEditingItem(null);} };
            const startEdit = (id, isManual, amount, unit) => setEditingItem({ id, isManual, amount: amount||'', unit: unit||'' });
            const formatIngredient = (amount,unit,item,estimatedQty) => { if(estimatedQty)return `${estimatedQty} ${item}`; if(!unit||unit==='piece')return amount>0?`${amount} ${item}`:item; return amount>0?`${amount} ${unit} ${item}`:item; };
            const handleAddItem = (e) => { e.preventDefault(); if(newItem.item.trim()){onAddManualItem(newItem.item,parseFloat(newItem.amount)||0,newItem.unit,newItem.category);setNewItem({item:'',amount:'',unit:'',category:'fresh'});setShowAddItem(false);} };
            const grouped = (items) => { const g={}; items.forEach(item=>{const c=item.category||'other';if(!g[c])g[c]=[];g[c].push(item);}); Object.keys(g).forEach(c=>g[c].sort((a,b)=>a.checked-b.checked)); return g; };
            const groupedRecipe = grouped(shoppingList.items);
            const groupedManual = grouped(shoppingList.manualItems);
            const allCategories = ['fresh','pantry','specialty','other'];

                                <div className="flex gap-2">

                                <div className="mt-4 pt-4" style={{ borderTop:'1px solid #e8dfd3' }}>

                                        <input type="text" placeholder="Unit" value={newItem.unit} onChange={e=>setNewItem({...newItem,unit:e.target.value})} className="px-3 py-2 rounded-lg border focus:outline-none" style={{ border:'2px solid #e8dfd3', background:'#faf8f5' }} />
                                    </div>
                                    <div className="flex gap-2">
                                        <select value={newItem.category} onChange={e=>setNewItem({...newItem,category:e.target.value})} className="flex-1 px-3 py-2 rounded-lg border focus:outline-none" style={{ border:'2px solid #e8dfd3', background:'#faf8f5' }}>
                                            <option value="fresh">Fresh</option><option value="pantry">Pantry</option><option value="specialty">Specialty</option><option value="other">Other</option>

                            <div className="space-y-4">
                                {allCategories.map(category => {
                                    const ri = groupedRecipe[category]||[];
                                    const mi = groupedManual[category]||[];

                                    return (
                                        <div key={category} className="rounded-2xl overflow-hidden shadow-sm" style={{ background:'#fffef9', border:'2px solid #e8dfd3' }}>
                                            <div className="px-5 py-3" style={{ background:'#f5ede1', borderBottom:'1px solid #e8dfd3' }}>
                                                <h2 className="font-bold text-base" style={{ color:'#3d2e1f' }}>{categoryNames[category]}</h2>
                                            </div>
                                            <div className="divide-y" style={{ borderColor:'#f5ede1' }}>
                                                {ri.map((item,idx) => (
                                                    <div key={`r-${item.item}-${idx}`} className={`px-5 py-4 transition ${item.checked?'opacity-40':''}`}>
                                                        {editingItem?.id===item.item && !editingItem?.isManual ? (
                                                            <div className="flex items-center gap-2">
                                                                <input type="number" step="0.1" value={editingItem.amount} onChange={e=>setEditingItem({...editingItem,amount:e.target.value})} onBlur={()=>handleEditSave(item.item,false)} autoFocus className="w-20 px-2 py-1 rounded-lg border text-sm" style={{ border:'2px solid #d4a574', background:'#faf8f5' }} />
                                                                <input type="text" value={editingItem.unit} onChange={e=>setEditingItem({...editingItem,unit:e.target.value})} onBlur={()=>handleEditSave(item.item,false)} placeholder="unit" className="w-20 px-2 py-1 rounded-lg border text-sm" style={{ border:'2px solid #d4a574', background:'#faf8f5' }} />
                                                                <span className="flex-1 text-sm font-medium" style={{ color:'#3d2e1f' }}>{item.item}</span>
                                                                <button onClick={()=>setEditingItem(null)} className="w-7 h-7 flex items-center justify-center rounded-full hover:opacity-80 transition" style={{ background:'#f5ede1', color:'#8b7355' }}>✕</button>
                                                            </div>
                                                        ) : (
                                                            <div className="flex items-center">
                                                                <input type="checkbox" checked={item.checked} onChange={()=>onToggleItem(item.item,false)} className="w-5 h-5 mr-4 flex-shrink-0 cursor-pointer" style={{ accentColor:'#d4a574' }} />
                                                                <div className="flex-1 min-w-0 cursor-pointer" onClick={()=>startEdit(item.item,false,item.amount,item.unit)}>
                                                                    <div className={`font-medium ${item.checked?'line-through':''}`} style={{ color:'#3d2e1f' }}>
                                                                        {formatIngredient(item.amount,item.unit,item.item,item.estimatedQty)}
                                                                    </div>

                                                                    <div className="text-xs mt-0.5" style={{ color:'#8b7355' }}>

                                                                <button onClick={()=>onRemoveItem(item.item,false)} className="ml-3 w-7 h-7 flex items-center justify-center rounded-full hover:opacity-80 transition flex-shrink-0" style={{ background:'#fde8e8', color:'#f5576c' }}>✕</button>

                                                                <input type="text" value={editingItem.unit} onChange={e=>setEditingItem({...editingItem,unit:e.target.value})} onBlur={()=>handleEditSave(item.id,true)} placeholder="unit" className="w-20 px-2 py-1 rounded-lg border text-sm" style={{ border:'2px solid #d4a574', background:'#faf8f5' }} />
                                                                <span className="flex-1 text-sm font-medium" style={{ color:'#3d2e1f' }}>{item.item}</span>
                                                                <button onClick={()=>setEditingItem(null)} className="w-7 h-7 flex items-center justify-center rounded-full hover:opacity-80 transition" style={{ background:'#f5ede1', color:'#8b7355' }}>✕</button>

                                                                <input type="checkbox" checked={item.checked} onChange={()=>onToggleItem(item.id,true)} className="w-5 h-5 mr-4 flex-shrink-0 cursor-pointer" style={{ accentColor:'#d4a574' }} />

                                                                        {formatIngredient(item.amount,item.unit,item.item,item.estimatedQty)}
                                                                        <span className="ml-2 text-xs font-normal" style={{ color:'#8b7355' }}>(manual)</span>
                                                                    </div>
                                                                </div>
                                                                <button onClick={()=>onRemoveItem(item.id,true)} className="ml-3 w-7 h-7 flex items-center justify-center rounded-full hover:opacity-80 transition flex-shrink-0" style={{ background:'#fde8e8', color:'#f5576c' }}>✕</button>
                                                            </div>

                                                    </div>
                                                ))}
                                            </div>
                                        </div>

        // ─── MAIN APP ─────────────────────────────────────────────────────────────
        // ─── TOAST NOTIFICATION SYSTEM ───────────────────────────────────────────
        const ToastContext = React.createContext(null);
        function ToastProvider({ children }) {
            const [toasts, setToasts] = useState([]);
            const addToast = React.useCallback((message, type='info', duration=3500) => {
                const id = Date.now();
                setToasts(t => [...t, { id, message, type }]);
                setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), duration);
            }, []);
            const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
            const colors = { success:'#EAF3DE', error:'#fde8e8', info:'#f5ede1', warning:'#FAEEDA' };
            const borders = { success:'#97c459', error:'#f5a0a0', info:'#e8dfd3', warning:'#EF9F27' };
            return (
                <ToastContext.Provider value={addToast}>
                    {children}
                    <div className="fixed bottom-6 left-1/2 z-50 flex flex-col gap-2 pointer-events-none" style={{ transform:'translateX(-50%)', minWidth:'280px', maxWidth:'90vw' }}>
                        {toasts.map(t => (
                            <div key={t.id} className="flex items-start gap-3 px-4 py-3 rounded-xl shadow-lg pointer-events-auto" style={{ background:colors[t.type], border:`1.5px solid ${borders[t.type]}`, color:'#3d2e1f', animation:'slideUp 0.2s ease' }}>
                                <span>{icons[t.type]}</span>
                                <span className="text-sm font-medium flex-1">{t.message}</span>
                            </div>
                        ))}
                    </div>
                    <style>{`@keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }`}</style>
                </ToastContext.Provider>
            );
        }
        const useToast = () => React.useContext(ToastContext);

        // ─── ERROR BOUNDARY ───────────────────────────────────────────────────────
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, info) { console.error('App error:', error, info); }
            render() {
                if (this.state.hasError) return (
                    <div className="min-h-screen flex items-center justify-center p-8" style={{ background:'#faf8f5' }}>
                        <div className="rounded-2xl p-8 max-w-md w-full text-center shadow-lg" style={{ background:'#fffef9', border:'2px solid #e8dfd3' }}>
                            <div className="text-5xl mb-4">😕</div>
                            <h2 className="text-xl font-bold mb-2" style={{ color:'#3d2e1f' }}>Something went wrong</h2>
                            <p className="text-sm mb-6" style={{ color:'#8b7355' }}>The app ran into an unexpected error. Try refreshing the page.</p>
                            <button onClick={()=>window.location.reload()} className="text-white px-6 py-3 rounded-xl font-semibold hover:opacity-90 transition" style={{ background:'#d4a574' }}>Refresh App</button>
                        </div>
                    </div>
                );
                return this.props.children;
            }
        }

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            useEffect(() => { const unsub = auth.onAuthStateChanged(u=>{ setUser(u); setLoading(false); }); return ()=>unsub(); }, []);
            if (loading) return (<div className="min-h-screen flex items-center justify-center" style={{ background:'#faf8f5' }}><div className="text-center"><div className="animate-spin rounded-full h-16 w-16 border-b-4 mx-auto mb-4" style={{ borderColor:'#d4a574' }}></div><p style={{ color:'#8b7355' }}>Loading...</p></div></div>);
            if (!user) return <AuthScreen />;
            return <RecipeApp user={user} />;
        }

        ReactDOM.render(<ErrorBoundary><ToastProvider><App /></ToastProvider></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
</html>
